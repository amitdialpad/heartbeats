<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heartbeats</title>
<style>
  :root {
    --page: #fff;
    --ink: #1f1f1f;
    --muted: #666;
    --quiet: #8a8a8a;
    --line: #e6e6e6;
    --soft: #f7f7f7;
    --focus: #111;
  }

  * {
    box-sizing: border-box;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    transition: background .2s ease, color .2s ease;
  }

  body.is-reading {
    --page: #101010;
    --ink: #f4f4f4;
    --muted: #b8b8b8;
    --quiet: #8c8c8c;
    --line: #303030;
    --soft: #1a1a1a;
    --focus: #fff;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  a {
    color: inherit;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .plain-button {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    padding: 0 10px;
    font-size: 14px;
    text-decoration: none;
  }

  .plain-button:hover {
    background: var(--soft);
    color: var(--ink);
  }

  main {
    width: 100%;
    min-height: 100vh;
    padding: 54px clamp(24px, 5.8vw, 96px) 136px;
  }

  .writer {
    min-height: calc(100vh - 166px);
  }

  .editor {
    display: block;
    width: 100%;
    min-height: calc(100vh - 190px);
    background: transparent;
    color: var(--ink);
    padding: 0;
    font-size: 32px;
    line-height: 1.58;
  }

  .preview-body {
    width: 100%;
    color: var(--ink);
    font-size: 28px;
    line-height: 1.56;
  }

  .editor:empty::before,
  figcaption:empty::before {
    content: attr(data-placeholder);
    color: var(--quiet);
    pointer-events: none;
  }

  .editor:empty::after {
    content: "";
    display: inline-block;
    width: 2px;
    height: .95em;
    margin-left: 7px;
    background: var(--ink);
    vertical-align: -.1em;
    animation: cursor-blink 1.05s steps(2, start) infinite;
  }

  @keyframes cursor-blink {
    50% {
      opacity: 0;
    }
  }

  .editor:focus {
    outline: 0;
  }

  .editor p,
  .preview-body p {
    margin: 0 0 18px;
    overflow-wrap: anywhere;
  }

  .preview-body p,
  .preview-body h2,
  .preview-body h3,
  .preview-body h4,
  .preview-body ul,
  .preview-body blockquote,
  .preview-body hr,
  .preview-body .link-card {
    max-width: 52ch;
  }

  .editor h2,
  .preview-body h2 {
    margin: 0 0 20px;
    font-size: 34px;
    font-weight: 650;
    line-height: 1.2;
  }

  .preview-body h2 {
    font-size: 30px;
  }

  .editor h3,
  .preview-body h3 {
    margin: 28px 0 10px;
    font-size: 22px;
    font-weight: 650;
    line-height: 1.3;
  }

  .preview-body h3 {
    font-size: 19px;
  }

  .editor h3[data-section],
  .preview-body h3.section-label {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    margin: 30px 0 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    padding: 0 9px;
    font-size: 12px;
    font-weight: 650;
    line-height: 1;
  }

  .editor h4,
  .preview-body h4 {
    margin: 22px 0 8px;
    font-size: 16px;
    font-weight: 650;
    line-height: 1.35;
  }

  .preview-body h4 {
    font-size: 15px;
  }

  .editor ul,
  .preview-body ul {
    margin: 0 0 22px;
    padding-left: 1.25em;
  }

  .editor li,
  .preview-body li {
    margin: 0 0 10px;
  }

  .editor blockquote,
  .preview-body blockquote {
    margin: 24px 0;
    padding-left: 18px;
    border-left: 2px solid var(--line);
    color: var(--muted);
  }

  .editor a,
  .preview-body a {
    color: var(--ink);
  }

  .editor figure,
  .preview-body figure {
    position: relative;
    width: min(100%, 980px);
    max-width: 100%;
    margin: 26px 0 30px;
  }

  .editor figure[data-image-size="small"],
  .preview-body figure[data-image-size="small"] {
    width: min(420px, 100%);
  }

  .editor figure[data-image-size="medium"],
  .preview-body figure[data-image-size="medium"] {
    width: min(640px, 100%);
  }

  .editor figure[data-image-size="large"],
  .preview-body figure[data-image-size="large"] {
    width: min(820px, 100%);
  }

  .editor img,
  .preview-body img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--soft);
  }

  .editor figcaption,
  .preview-body figcaption {
    margin-top: 8px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.45;
  }

  .image-controls {
    position: absolute;
    top: 8px;
    right: 8px;
    display: flex;
    gap: 2px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    padding: 3px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }

  .editor figure:hover .image-controls,
  .editor figure:focus-within .image-controls {
    opacity: 1;
    pointer-events: auto;
  }

  .image-controls button {
    min-width: 28px;
    min-height: 26px;
    border: 0;
    border-radius: 4px;
    background: transparent;
    color: var(--ink);
    padding: 0 6px;
    font: inherit;
    font-size: 12px;
    font-weight: 650;
    line-height: 1;
  }

  .image-controls button:hover {
    background: var(--soft);
  }

  .preview-body .image-controls {
    display: none;
  }

  .editor.is-drop-target {
    box-shadow: inset 0 0 0 2px var(--line);
  }

  .preview-panel {
    width: 100%;
  }

  .preview-title {
    display: none;
    margin: 0 0 30px;
    color: var(--quiet);
    font-size: 15px;
    font-weight: 500;
    line-height: 1.4;
  }

  .preview-body hr {
    height: 1px;
    border: 0;
    background: var(--line);
    margin: 28px 0;
  }

  .preview-body a:not(.link-card) {
    text-decoration-thickness: 1px;
    text-underline-offset: 5px;
  }

  .preview-body .link-card {
    display: block;
    width: min(100%, 760px);
    margin: 10px 0 30px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 15px 16px 14px;
    text-decoration: none;
  }

  .preview-body .link-card:hover {
    background: var(--soft);
  }

  .preview-body .link-card-title,
  .preview-body .link-card-url {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .preview-body .link-card-title {
    color: var(--ink);
    font-size: 17px;
    font-weight: 650;
    line-height: 1.35;
  }

  .preview-body .link-card-url {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }

  .preview-meta {
    margin: 0 0 24px;
    color: var(--quiet);
    font-size: 13px;
    line-height: 1.5;
  }

  .empty {
    margin: 0;
    color: var(--muted);
    font-size: 18px;
  }

  [hidden] {
    display: none !important;
  }

  .file-input {
    position: fixed;
    inline-size: 1px;
    block-size: 1px;
    opacity: 0;
    pointer-events: none;
  }

  .chrome-hotspot {
    position: fixed;
    right: 0;
    bottom: 0;
    left: 0;
    z-index: 1;
    height: 120px;
  }

  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 2;
    display: grid;
    grid-template-columns: minmax(120px, auto) minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px clamp(18px, 3vw, 34px);
    background: var(--page);
    border-top: 1px solid var(--line);
    opacity: 0;
    pointer-events: none;
    transform: translateY(18px);
    transition: opacity .7s ease, transform .7s ease;
  }

  .chrome-hotspot:hover + .footer-bar,
  .footer-bar:hover,
  .footer-bar:focus-within,
  body.chrome-visible .footer-bar {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  body.chrome-suppressed .footer-bar {
    opacity: 0;
    pointer-events: none;
    transform: translateY(18px);
  }

  .footer-left,
  .footer-actions {
    display: flex;
    align-items: center;
    min-width: 0;
  }

  .footer-left {
    gap: 8px;
  }

  .footer-actions {
    justify-content: flex-end;
    gap: 8px;
  }

  .footer-date {
    color: var(--ink);
    font-size: 14px;
    font-weight: 650;
    line-height: 1.2;
    text-decoration: none;
  }

  .status-chip {
    min-height: 24px;
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
    padding: 0 9px;
    font-size: 12px;
    font-weight: 650;
    line-height: 1;
  }

  .status-chip:hover {
    background: var(--soft);
    color: var(--ink);
  }

  .menu-popover,
  .selection-toolbar {
    position: fixed;
    z-index: 5;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--page);
    box-shadow: 0 8px 28px rgb(0 0 0 / .08);
  }

  .menu-popover {
    bottom: 68px;
    left: clamp(18px, 3vw, 34px);
    width: min(300px, calc(100vw - 36px));
    max-height: min(640px, calc(100vh - 92px));
    overflow: auto;
    padding: 8px;
  }

  .menu-popover button,
  .selection-toolbar button {
    border: 0;
    background: transparent;
    color: var(--ink);
    font: inherit;
    cursor: pointer;
  }

  .menu-popover button {
    width: 100%;
    min-height: 32px;
    display: block;
    border-radius: 6px;
    padding: 0 8px;
    font-size: 13px;
    line-height: 1;
    text-align: left;
  }

  .menu-section + .menu-section {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }

  .menu-label {
    margin: 0 0 4px;
    color: var(--quiet);
    padding: 0 8px;
    font-size: 11px;
    font-weight: 650;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .mobile-menu-item {
    display: none !important;
  }

  .mobile-menu-item + .menu-section {
    margin-top: 0;
    padding-top: 0;
    border-top: 0;
  }

  .menu-popover button:hover,
  .selection-toolbar button:hover {
    background: var(--soft);
  }

  .selection-toolbar {
    display: flex;
    gap: 2px;
    padding: 4px;
  }

  .selection-toolbar button {
    min-width: 30px;
    min-height: 28px;
    border-radius: 5px;
    padding: 0 7px;
    font-size: 13px;
    font-weight: 650;
    line-height: 1;
  }

  .footer-status {
    min-height: 22px;
    color: var(--quiet);
    font-size: 14px;
    line-height: 1.4;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .done-button {
    min-width: 86px;
    min-height: 42px;
    flex: none;
    border: 1px solid var(--ink);
    border-radius: 6px;
    background: var(--ink);
    color: var(--page);
    padding: 0 18px;
    font-size: 15px;
    font-weight: 650;
    line-height: 1;
  }

  .done-button:hover {
    background: #000;
  }

  .done-button:disabled {
    border-color: var(--line);
    background: var(--soft);
    color: var(--quiet);
    cursor: default;
  }

  code {
    border-radius: 4px;
    background: var(--soft);
    color: var(--ink);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: .86em;
    padding: 2px 5px;
  }

  dialog {
    width: min(520px, calc(100vw - 32px));
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--page);
    color: var(--ink);
    padding: 0;
  }

  dialog::backdrop {
    background: rgb(255 255 255 / .78);
  }

  .settings {
    padding: 24px;
  }

  .settings h2 {
    margin: 0 0 18px;
    font-size: 22px;
    line-height: 1.25;
  }

  .field {
    display: block;
    margin-top: 16px;
  }

  .field span {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .field input {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 0 10px;
    font-size: 15px;
  }

  .hint {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
  }

  .link-settings {
    padding: 18px;
  }

  .link-settings h2 {
    margin: 0 0 12px;
    font-size: 18px;
    line-height: 1.25;
  }

  @media (max-width: 640px) {
    main {
      padding: 34px 18px 230px;
    }

    .editor {
      min-height: calc(100vh - 264px);
      font-size: 27px;
      line-height: 1.55;
    }

    .preview-body {
      min-height: calc(100vh - 264px);
      font-size: 24px;
      line-height: 1.55;
    }

    .editor h2 {
      font-size: 29px;
    }

    .preview-body h2 {
      font-size: 26px;
    }

    .editor h3 {
      font-size: 21px;
    }

    .preview-body h3 {
      font-size: 18px;
    }

    .footer-bar {
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      padding: 11px 12px;
    }

    .footer-left,
    .footer-actions {
      gap: 6px;
    }

    .plain-button {
      min-height: 34px;
      padding: 0 7px;
      font-size: 13px;
    }

    .status-chip {
      padding: 0 7px;
    }

    .footer-status {
      min-height: 18px;
      font-size: 13px;
      text-align: right;
    }

    .done-button {
      min-width: 74px;
      padding: 0 14px;
    }
  }

  @media (max-width: 430px) {
    .footer-bar {
      gap: 6px;
    }

    .footer-date {
      max-width: 42px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #previewButton {
      display: none;
    }

    .mobile-menu-item {
      display: block !important;
    }

    .mobile-menu-item + .menu-section {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .done-button {
      min-width: 64px;
    }
  }
</style>
</head>
<body>
  <main>
    <section class="writer" aria-label="Write today's beat">
      <div class="editor" id="editor" contenteditable="true" spellcheck="true" data-placeholder="Start writing"></div>
      <section class="preview-panel" id="previewPanel" hidden aria-label="Preview">
        <p class="preview-title">Preview</p>
        <div class="preview-meta" id="previewMeta"></div>
        <div class="preview-body" id="previewBody"></div>
      </section>
    </section>
  </main>

  <div class="chrome-hotspot" id="chromeHotspot" aria-hidden="true"></div>
  <footer class="footer-bar">
    <div class="footer-left">
      <a class="footer-date" id="footerDate" href="https://amitdialpad.github.io/heartbeats/"></a>
      <button class="status-chip" id="localModeIndicator" type="button" hidden title="Done saves locally in this browser. Nothing is pushed to GitHub.">Local</button>
    </div>
    <div class="footer-status" id="meta"></div>
    <div class="footer-actions">
      <button class="plain-button" id="previewButton" type="button">Preview</button>
      <button class="plain-button" id="commandButton" type="button" aria-expanded="false" aria-controls="commandMenu">Tools</button>
      <button class="done-button" id="doneButton" type="button">Done</button>
    </div>
  </footer>
  <div class="menu-popover" id="commandMenu" hidden>
    <div class="menu-section mobile-menu-item">
      <button type="button" id="previewCommandButton" data-command="preview">Preview</button>
    </div>
    <div class="menu-section">
      <p class="menu-label">Add</p>
      <button type="button" data-command="add-image">Add image</button>
      <button type="button" data-command="add-link">Add link</button>
    </div>
    <div class="menu-section">
      <p class="menu-label">Mark current thought</p>
      <button type="button" data-section-command="green">Mark as Green</button>
      <button type="button" data-section-command="concerns">Mark as Concern</button>
      <button type="button" data-section-command="red-flags">Mark as Red flag</button>
      <button type="button" data-section-command="point-of-view">Mark as POV</button>
    </div>
    <div class="menu-section">
      <p class="menu-label">Insert structure</p>
      <button type="button" data-insert-template="daily">Insert daily structure</button>
      <button type="button" data-insert-template="concern">Concern</button>
      <button type="button" data-insert-template="red-flag">Red flag</button>
      <button type="button" data-insert-template="pov">POV</button>
    </div>
    <div class="menu-section">
      <p class="menu-label">Manage</p>
      <button type="button" data-command="past-updates">Past updates</button>
      <button type="button" data-command="setup">Setup</button>
    </div>
  </div>
  <div class="selection-toolbar" id="selectionToolbar" hidden aria-label="Text formatting">
    <button type="button" data-format-action="bold" title="Bold">B</button>
    <button type="button" data-format-action="italic" title="Italic">I</button>
    <button type="button" data-format-action="link" title="Link">Link</button>
    <button type="button" data-format-action="code" title="Inline code">Code</button>
    <button type="button" data-format-action="quote" title="Quote">Quote</button>
  </div>
  <input class="file-input" id="imageInput" type="file" accept="image/*" multiple />

  <dialog id="settingsDialog">
    <form class="settings" method="dialog">
      <h2>Setup</h2>
      <label class="field">
        <span>Author</span>
        <input id="authorInput" autocomplete="username" value="amit" />
      </label>
      <label class="field">
        <span>GitHub token</span>
        <input id="tokenInput" autocomplete="off" type="password" placeholder="github_pat_..." />
      </label>
      <p class="hint">Fine-grained token, repo access to <code>amitdialpad/heartbeats</code>, Contents read and write.</p>
      <div class="settings-actions">
        <button class="plain-button" id="forgetButton" type="button">Forget</button>
        <button class="plain-button" value="cancel">Close</button>
        <button class="done-button" id="saveSettingsButton" type="button">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="linkDialog">
    <form class="link-settings" id="linkForm" method="dialog">
      <h2>Link</h2>
      <label class="field">
        <span>URL</span>
        <input id="linkUrlInput" autocomplete="off" placeholder="https://example.com" />
      </label>
      <label class="field">
        <span>Label</span>
        <input id="linkLabelInput" autocomplete="off" />
      </label>
      <div class="settings-actions">
        <button class="plain-button" id="cancelLinkButton" type="button">Cancel</button>
        <button class="done-button" id="saveLinkButton" type="submit">Apply</button>
      </div>
    </form>
  </dialog>

<script>
const OWNER = "amitdialpad";
const REPO = "heartbeats";
const BRANCH = "main";
const STORAGE = {
  token: "heartbeats.githubToken",
  author: "heartbeats.author",
  draft: "heartbeats.draft",
  draftContext: "heartbeats.draftContext",
  editing: "heartbeats.editing",
  localEntries: "heartbeats.localEntries",
  localOverrides: "heartbeats.localOverrides",
  hiddenEntries: "heartbeats.hiddenEntries",
};
const LOCAL_ONLY = ["localhost", "127.0.0.1", ""].includes(location.hostname);
const DRAFT_DB = {
  name: "heartbeats-drafts",
  store: "drafts",
  key: "active",
};

const editor = document.getElementById("editor");
const imageInput = document.getElementById("imageInput");
const chromeHotspot = document.getElementById("chromeHotspot");
const footerBar = document.querySelector(".footer-bar");
const previewButton = document.getElementById("previewButton");
const previewCommandButton = document.getElementById("previewCommandButton");
const previewPanel = document.getElementById("previewPanel");
const previewMeta = document.getElementById("previewMeta");
const previewBody = document.getElementById("previewBody");
const doneButton = document.getElementById("doneButton");
const meta = document.getElementById("meta");
const footerDate = document.getElementById("footerDate");
const localModeIndicator = document.getElementById("localModeIndicator");
const commandButton = document.getElementById("commandButton");
const commandMenu = document.getElementById("commandMenu");
const selectionToolbar = document.getElementById("selectionToolbar");
const settingsDialog = document.getElementById("settingsDialog");
const authorInput = document.getElementById("authorInput");
const tokenInput = document.getElementById("tokenInput");
const saveSettingsButton = document.getElementById("saveSettingsButton");

function pad(n) {
  return String(n).padStart(2, "0");
}

function localDate(d = new Date()) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function localTime(d = new Date()) {
  return `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function displayDate(d = new Date()) {
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function setFooterDate() {
  const fullDate = displayDate();
  footerDate.textContent = "Today";
  footerDate.title = fullDate;
  footerDate.setAttribute("aria-label", fullDate);
}

function readJson(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
  } catch {
    return fallback;
  }
}

function writeJson(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function draftContext() {
  return currentEdit ? { mode: "edit", id: currentEdit.id } : { mode: "new", id: "" };
}

function contextMatchesCurrent(context = {}) {
  if (currentEdit) return context.mode === "edit" && context.id === currentEdit.id;
  return !context.mode || context.mode === "new";
}

function openDraftDb() {
  return new Promise((resolve, reject) => {
    if (!("indexedDB" in window)) {
      reject(new Error("IndexedDB unavailable"));
      return;
    }
    const request = indexedDB.open(DRAFT_DB.name, 1);
    request.onupgradeneeded = () => request.result.createObjectStore(DRAFT_DB.store, { keyPath: "key" });
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function saveDraftRecord(html, context = draftContext()) {
  try {
    const db = await openDraftDb();
    await new Promise((resolve, reject) => {
      const transaction = db.transaction(DRAFT_DB.store, "readwrite");
      transaction.objectStore(DRAFT_DB.store).put({ key: DRAFT_DB.key, html, context, updatedAt: Date.now() });
      transaction.oncomplete = resolve;
      transaction.onerror = () => reject(transaction.error);
    });
    db.close();
  } catch {
    try {
      localStorage.setItem(STORAGE.draft, html);
      writeJson(STORAGE.draftContext, context);
    } catch {
      meta.textContent = "Draft too large for browser storage.";
    }
  }
}

async function loadDraftRecord() {
  try {
    const db = await openDraftDb();
    const record = await new Promise((resolve, reject) => {
      const transaction = db.transaction(DRAFT_DB.store, "readonly");
      const request = transaction.objectStore(DRAFT_DB.store).get(DRAFT_DB.key);
      request.onsuccess = () => resolve(request.result || null);
      request.onerror = () => reject(request.error);
    });
    db.close();
    if (record) return record;
  } catch {}

  const html = localStorage.getItem(STORAGE.draft) || "";
  if (!html) return null;
  return { html, context: readJson(STORAGE.draftContext, { mode: "new", id: "" }) };
}

async function clearDraftRecord() {
  localStorage.removeItem(STORAGE.draft);
  localStorage.removeItem(STORAGE.draftContext);
  try {
    const db = await openDraftDb();
    await new Promise((resolve, reject) => {
      const transaction = db.transaction(DRAFT_DB.store, "readwrite");
      transaction.objectStore(DRAFT_DB.store).delete(DRAFT_DB.key);
      transaction.oncomplete = resolve;
      transaction.onerror = () => reject(transaction.error);
    });
    db.close();
  } catch {}
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function attr(s) {
  return esc(s).replace(/"/g, "&quot;");
}

function safeUrl(raw) {
  const url = raw.trim();
  return /^(https?:|mailto:|#|\/|\.\/|\.\.\/|assets\/|data:image\/|[a-z0-9._~/-]+(?:[?#][^\s]*)?$)/i.test(url) ? attr(url) : "#";
}

function linkHost(raw) {
  try {
    return new URL(raw).hostname.replace(/^www\./, "");
  } catch {
    return raw.replace(/^https?:\/\//, "").split("/")[0] || raw;
  }
}

function standaloneLink(t) {
  const markdown = t.match(/^\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)$/);
  if (markdown) return { label: markdown[1].trim(), url: markdown[2].trim() };
  const raw = t.match(/^(https?:\/\/[^\s<]+)$/);
  if (!raw) return null;
  return { label: linkHost(raw[1]), url: raw[1].replace(/[.,;:!?]+$/, "") };
}

function linkCard(url, label) {
  const clean = url.trim();
  const title = (label || "").trim() || linkHost(clean);
  return `<a class="link-card" href="${safeUrl(clean)}" target="_blank" rel="noopener"><span class="link-card-title">${esc(title)}</span><span class="link-card-url">${attr(linkHost(clean))}</span></a>`;
}

function sectionKey(s) {
  const key = s.trim().toLowerCase();
  const aliases = {
    green: "green",
    concerns: "concerns",
    "red flag": "red-flags",
    "red flags": "red-flags",
    pov: "point-of-view",
    "point of view": "point-of-view",
  };
  return aliases[key] || "";
}

function inline(s) {
  const tokens = [];
  const stash = (html) => {
    tokens.push(html);
    return `\u0000${tokens.length - 1}\u0000`;
  };

  let html = esc(s);
  html = html.replace(/`([^`]+)`/g, (_, code) => stash(`<code>${code}</code>`));
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    const label = text.trim() || url.trim();
    return stash(`<a href="${safeUrl(url)}" target="_blank" rel="noopener">${inline(label)}</a>`);
  });
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>");
  html = html.replace(/(^|[\s(])((?:https?:\/\/)[^\s<)]+)/g, (_, lead, url) => {
    const clean = url.replace(/[.,;:!?]+$/, "");
    const tail = url.slice(clean.length);
    return `${lead}${stash(`<a href="${safeUrl(clean)}" target="_blank" rel="noopener">${attr(clean)}</a>`)}${tail}`;
  });
  return html.replace(/\u0000(\d+)\u0000/g, (_, i) => tokens[Number(i)] || "");
}

function mdToHtml(md) {
  const out = [];
  let list = null;
  let quote = null;
  const flush = () => {
    if (list) { out.push("<ul>" + list.join("") + "</ul>"); list = null; }
    if (quote) { out.push("<blockquote>" + quote.join("") + "</blockquote>"); quote = null; }
  };

  for (const line of md.split("\n")) {
    const t = line.trim();
    if (!t) { flush(); continue; }
    const image = t.match(/^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"(small|medium|large|full)")?\)$/);
    if (image) {
      flush();
      const caption = image[1].trim();
      const size = image[3] ? ` data-image-size="${attr(image[3])}"` : "";
      out.push(`<figure${size}><img src="${safeUrl(image[2])}" alt="${attr(caption)}" loading="lazy">${caption ? `<figcaption>${inline(caption)}</figcaption>` : ""}</figure>`);
      continue;
    }
    const card = standaloneLink(t);
    if (card) { flush(); out.push(linkCard(card.url, card.label)); continue; }
    if (/^-{3,}$/.test(t)) { flush(); out.push("<hr>"); continue; }
    if (t.startsWith("# ")) { flush(); out.push(`<h2>${inline(t.slice(2))}</h2>`); continue; }
    if (t.startsWith("## ")) {
      flush();
      const label = t.slice(3).trim();
      const key = sectionKey(label);
      out.push(key ? `<h3 class="section-label" data-section="${attr(key)}">${inline(label)}</h3>` : `<h3>${inline(label)}</h3>`);
      continue;
    }
    if (t.startsWith("### ")) { flush(); out.push(`<h4>${inline(t.slice(4))}</h4>`); continue; }
    if (t.startsWith("- ")) { (list ||= []).push(`<li>${inline(t.slice(2))}</li>`); continue; }
    if (t.startsWith("> ")) { (quote ||= []).push(`<p>${inline(t.slice(2))}</p>`); continue; }
    flush();
    out.push(`<p>${inline(t)}</p>`);
  }
  flush();
  return out.join("\n");
}

function editorText() {
  const clone = editor.cloneNode(true);
  clone.querySelectorAll(".image-controls").forEach(node => node.remove());
  return (clone.innerText || clone.textContent || "").replace(/\u00a0/g, " ").trim();
}

function wordCount() {
  return (editorText().match(/\S+/g) || []).length;
}

function imageCount() {
  return editor.querySelectorAll("img").length;
}

function editorIsEmpty() {
  return !editorText() && imageCount() === 0;
}

function updateMeta() {
  const words = wordCount();
  const images = imageCount();
  if (!words && !images) {
    const state = [];
    if (currentEdit) state.push("Editing");
    if (!LOCAL_ONLY && !hasToken()) state.push("Setup needed");
    meta.textContent = state.join(", ");
    doneButton.disabled = false;
    return;
  }
  const parts = [];
  if (words) parts.push(words === 1 ? "1 word" : `${words} words`);
  if (images) parts.push(images === 1 ? "1 image" : `${images} images`);
  if (currentEdit) parts.push("editing");
  if (!LOCAL_ONLY && !hasToken()) parts.push("setup needed");
  meta.textContent = parts.join(", ");
}

function hasToken() {
  return Boolean(localStorage.getItem(STORAGE.token));
}

function safeAuthor() {
  const author = (localStorage.getItem(STORAGE.author) || "amit").toLowerCase();
  return author.replace(/[^a-z0-9-]/g, "") || "amit";
}

function inferStatus(text) {
  const lower = text.toLowerCase();
  const red = [
    /\bred flag\b/,
    /\bblocked\b/,
    /\bstuck\b/,
    /\bcannot\b/,
    /\bcan't\b/,
    /\bcritical\b/,
    /\burgent\b/,
    /\bbroken\b/,
    /\bship(ping)? blocker\b/,
    /\bdoes not work\b/,
    /\bneed(s)? (a )?decision\b/,
    /\bno path\b/,
  ];
  const concern = [
    /\bconcern\b/,
    /\bworried\b/,
    /\brisk\b/,
    /\bdelay(ed)?\b/,
    /\bwaiting\b/,
    /\bunclear\b/,
    /\bissue\b/,
    /\bproblem\b/,
    /\bpush back\b/,
    /\bdepends on\b/,
    /\bneed\b/,
  ];
  if (red.some(pattern => pattern.test(lower))) return "red";
  if (concern.some(pattern => pattern.test(lower))) return "concern";
  return "green";
}

function buildMarkdown(note, date, status, author) {
  return `---\nauthor: ${author}\ndate: ${date}\nstatus: ${status}\n---\n\n${note}\n`;
}

function bytesToBase64(text) {
  const bytes = new TextEncoder().encode(text);
  let binary = "";
  for (let i = 0; i < bytes.length; i += 8192) {
    binary += String.fromCharCode(...bytes.slice(i, i + 8192));
  }
  return btoa(binary);
}

function rememberSelection() {
  const selection = window.getSelection();
  if (!selection || !selection.rangeCount) return;
  const range = selection.getRangeAt(0);
  if (editor.contains(range.commonAncestorContainer)) {
    lastRange = range.cloneRange();
  }
}

function restoreSelection() {
  editor.focus();
  if (!lastRange) return;
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(lastRange);
}

function insertNodeAtCursor(node) {
  restoreSelection();
  const selection = window.getSelection();
  let range = selection && selection.rangeCount ? selection.getRangeAt(0) : null;
  if (!range || !editor.contains(range.commonAncestorContainer)) {
    range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
  }
  range.deleteContents();
  range.insertNode(node);
  range.setStartAfter(node);
  range.collapse(true);
  selection.removeAllRanges();
  selection.addRange(range);
  rememberSelection();
}

function insertFragmentAtCursor(fragment) {
  restoreSelection();
  const selection = window.getSelection();
  let range = selection && selection.rangeCount ? selection.getRangeAt(0) : null;
  if (!range || !editor.contains(range.commonAncestorContainer)) {
    range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
  }
  const lastNode = fragment.lastChild;
  range.deleteContents();
  range.insertNode(fragment);
  if (lastNode) {
    range.setStartAfter(lastNode);
    range.collapse(true);
    selection.removeAllRanges();
    selection.addRange(range);
  }
  rememberSelection();
}

function insertTextAtCursor(text) {
  insertNodeAtCursor(document.createTextNode(text));
}

function insertHtmlAtCursor(html) {
  restoreSelection();
  const template = document.createElement("template");
  template.innerHTML = html.trim();
  const fragment = template.content;
  const selection = window.getSelection();
  let range = selection && selection.rangeCount ? selection.getRangeAt(0) : null;
  if (!range || !editor.contains(range.commonAncestorContainer)) {
    range = document.createRange();
    range.selectNodeContents(editor);
    range.collapse(false);
  }
  range.deleteContents();
  range.insertNode(fragment);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
  rememberSelection();
}

function selectionInsideEditor() {
  const selection = window.getSelection();
  if (!selection || !selection.rangeCount || selection.isCollapsed) return null;
  const range = selection.getRangeAt(0);
  return editor.contains(range.commonAncestorContainer) ? range : null;
}

function selectedText() {
  const range = selectionInsideEditor();
  return range ? range.toString().trim() : "";
}

function persistEditorChange() {
  persistDraft();
  updateMeta();
  updatePreview();
  rememberSelection();
}

function wrapSelection(tag) {
  const range = selectionInsideEditor() || lastRange;
  if (!range || range.collapsed) return;
  restoreSelection();
  const selection = window.getSelection();
  const liveRange = selection && selection.rangeCount ? selection.getRangeAt(0) : range;
  const wrapper = document.createElement(tag);
  try {
    liveRange.surroundContents(wrapper);
  } catch {
    wrapper.appendChild(liveRange.extractContents());
    liveRange.insertNode(wrapper);
  }
  liveRange.selectNodeContents(wrapper);
  selection.removeAllRanges();
  selection.addRange(liveRange);
  persistEditorChange();
  updateSelectionToolbar();
}

function quoteSelection() {
  const range = selectionInsideEditor() || lastRange;
  if (!range || range.collapsed) return;
  restoreSelection();
  const selection = window.getSelection();
  const liveRange = selection && selection.rangeCount ? selection.getRangeAt(0) : range;
  const text = liveRange.toString().trim();
  if (!text) return;
  const quote = document.createElement("blockquote");
  for (const line of text.split(/\n+/).map(line => line.trim()).filter(Boolean)) {
    const p = document.createElement("p");
    p.textContent = line;
    quote.appendChild(p);
  }
  liveRange.deleteContents();
  liveRange.insertNode(quote);
  liveRange.setStartAfter(quote);
  liveRange.collapse(true);
  selection.removeAllRanges();
  selection.addRange(liveRange);
  persistEditorChange();
  updateSelectionToolbar();
}

function slugFileName(name, fallback = "screenshot.png") {
  const source = name || fallback;
  const dot = source.lastIndexOf(".");
  const base = (dot === -1 ? source : source.slice(0, dot)).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "image";
  const ext = (dot === -1 ? "png" : source.slice(dot + 1).toLowerCase().replace(/[^a-z0-9]/g, "")) || "png";
  return `${base}.${ext}`;
}

function fileExtension(file) {
  const name = file?.name || "";
  const dot = name.lastIndexOf(".");
  const fromName = dot === -1 ? "" : name.slice(dot + 1).toLowerCase().replace(/[^a-z0-9]/g, "");
  if (fromName && fromName.length <= 5) return fromName;
  const fromType = (file?.type || "").split("/")[1] || "png";
  return fromType.replace(/[^a-z0-9]/g, "") || "png";
}

function contextTextForImageName() {
  const block = currentTopLevelBlock();
  const candidates = [];
  if (block && block !== editor) candidates.push(block.innerText || block.textContent || "");
  let previous = block?.previousElementSibling;
  while (previous && candidates.join(" ").trim().split(/\s+/).length < 8) {
    candidates.unshift(previous.innerText || previous.textContent || "");
    previous = previous.previousElementSibling;
  }
  const text = candidates.join(" ").replace(/\s+/g, " ").trim() || editorText();
  return text.split(/\s+/).slice(-8).join(" ");
}

function contextualImageFileName(file, index = 0) {
  const generic = /^(image|screenshot|screen shot|clipboard|pasted image)/i.test(file?.name || "");
  if (file?.name && !generic) return slugFileName(file.name);
  const context = contextTextForImageName();
  const base = (context || `heartbeat ${localDate()} ${localTime()}`).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "").slice(0, 72) || "heartbeat-image";
  const suffix = index ? `-${pad(index + 1)}` : "";
  return `${base}${suffix}.${fileExtension(file)}`;
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function insertParagraphBreak() {
  const p = document.createElement("p");
  p.appendChild(document.createElement("br"));
  insertNodeAtCursor(p);
}

const IMAGE_SIZES = ["small", "medium", "large", "full"];

function imageControls() {
  const controls = document.createElement("div");
  controls.className = "image-controls";
  controls.contentEditable = "false";
  controls.innerHTML = `
    <button type="button" data-image-action="smaller" title="Make image smaller">-</button>
    <button type="button" data-image-action="larger" title="Make image larger">+</button>
    <button type="button" data-image-action="full" title="Use full width">Full</button>
  `;
  return controls;
}

function ensureImageControls(root = editor) {
  const figures = root.matches?.("figure") ? [root] : Array.from(root.querySelectorAll?.("figure") || []);
  for (const figure of figures) {
    if (!figure.querySelector("img")) continue;
    figure.dataset.imageSize ||= "full";
    figure.tabIndex = 0;
    if (!figure.querySelector(":scope > .image-controls")) figure.prepend(imageControls());
  }
}

function resizeImageFigure(figure, action) {
  if (!figure) return;
  const current = figure.dataset.imageSize || "full";
  if (action === "full") {
    figure.dataset.imageSize = "full";
  } else {
    const index = Math.max(0, IMAGE_SIZES.indexOf(current));
    const nextIndex = action === "larger" ? Math.min(IMAGE_SIZES.length - 1, index + 1) : Math.max(0, index - 1);
    figure.dataset.imageSize = IMAGE_SIZES[nextIndex];
  }
  persistEditorChange();
}

async function insertImageFile(file, index = 0) {
  if (!file || !file.type.startsWith("image/")) return;
  const src = await fileToDataUrl(file);
  const figure = document.createElement("figure");
  const img = document.createElement("img");
  const caption = document.createElement("figcaption");
  figure.dataset.imageSize = "full";
  figure.tabIndex = 0;
  img.src = src;
  img.alt = "";
  img.dataset.filename = contextualImageFileName(file, index);
  caption.contentEditable = "true";
  caption.dataset.placeholder = "Caption";
  figure.appendChild(img);
  figure.appendChild(caption);
  ensureImageControls(figure);
  insertNodeAtCursor(figure);
  insertParagraphBreak();
  persistDraft();
  updateMeta();
}

async function insertImageFiles(files) {
  for (const [index, file] of files.entries()) {
    await insertImageFile(file, index);
  }
}

function cleanClipboardHtml(html) {
  if (!html) return "";
  const doc = new DOMParser().parseFromString(html, "text/html");
  const blockTags = new Set(["ADDRESS", "ARTICLE", "ASIDE", "BLOCKQUOTE", "DIV", "FIGURE", "FOOTER", "H1", "H2", "H3", "H4", "HEADER", "LI", "MAIN", "P", "PRE", "SECTION", "TR"]);
  const walk = (node) => {
    if (node.nodeType === Node.TEXT_NODE) return node.textContent.replace(/\s+/g, " ");
    if (node.nodeType !== Node.ELEMENT_NODE) return "";
    const tag = node.tagName;
    if (tag === "BR") return "\n";
    if (tag === "A") {
      const text = Array.from(node.childNodes).map(walk).join("").trim();
      const href = node.getAttribute("href") || "";
      return href ? `[${text || href}](${href})` : text;
    }
    const text = Array.from(node.childNodes).map(walk).join("");
    return blockTags.has(tag) ? `\n${text.trim()}\n` : text;
  };
  return walk(doc.body).replace(/[ \t]+\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
}

function insertCleanText(text) {
  const normalized = text.replace(/\r\n?/g, "\n");
  if (!normalized.trim()) return;
  const fragment = document.createDocumentFragment();
  for (const line of normalized.split("\n")) {
    const p = document.createElement("p");
    if (line.trim()) {
      p.textContent = line.trim();
    } else {
      p.appendChild(document.createElement("br"));
    }
    fragment.appendChild(p);
  }
  insertFragmentAtCursor(fragment);
  persistEditorChange();
}

function normalizeUrl(url) {
  const clean = url.trim();
  if (!clean) return "";
  return /^(https?:|mailto:)/i.test(clean) ? clean : `https://${clean}`;
}

function isLikelyUrl(text) {
  const clean = text.trim();
  if (!clean || /\s/.test(clean)) return false;
  return /^(https?:\/\/|mailto:|www\.|[a-z0-9.-]+\.[a-z]{2,}(?:[/:?#].*)?$)/i.test(clean);
}

function firstClipboardLink(html, plain) {
  if (isLikelyUrl(plain)) return normalizeUrl(plain);
  if (!html) return "";
  const doc = new DOMParser().parseFromString(html, "text/html");
  const href = doc.querySelector("a[href]")?.getAttribute("href") || "";
  return isLikelyUrl(href) ? normalizeUrl(href) : "";
}

function linkSelectedText(url) {
  const activeRange = selectionInsideEditor();
  const range = activeRange || lastRange;
  if (!range || range.collapsed || !url) return false;
  if (activeRange) {
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(activeRange);
  } else {
    restoreSelection();
  }
  const selection = window.getSelection();
  const liveRange = selection && selection.rangeCount ? selection.getRangeAt(0) : range;
  if (liveRange.collapsed) return false;
  const link = document.createElement("a");
  link.href = normalizeUrl(url);
  link.target = "_blank";
  link.rel = "noopener";
  link.appendChild(liveRange.extractContents());
  liveRange.insertNode(link);
  liveRange.selectNodeContents(link);
  selection.removeAllRanges();
  selection.addRange(liveRange);
  persistEditorChange();
  return true;
}

function closestLinkFromSelection() {
  const selection = window.getSelection();
  if (!selection || !selection.rangeCount) return null;
  let node = selection.getRangeAt(0).commonAncestorContainer;
  if (node.nodeType === Node.TEXT_NODE) node = node.parentElement;
  return node?.closest?.("a") && editor.contains(node.closest("a")) ? node.closest("a") : null;
}

function openLinkDialog() {
  rememberSelection();
  restoreSelection();
  editingLink = closestLinkFromSelection();
  const selection = window.getSelection();
  linkRange = selection && selection.rangeCount ? selection.getRangeAt(0).cloneRange() : null;
  const label = editingLink ? editingLink.textContent.trim() : selectedText();
  const href = editingLink ? editingLink.getAttribute("href") || "" : label.startsWith("http") || label.startsWith("mailto:") ? label : "";
  linkUrlInput.value = href;
  linkLabelInput.value = label;
  linkDialog.showModal();
  setTimeout(() => linkUrlInput.focus(), 0);
}

function applyLinkFromDialog() {
  const url = normalizeUrl(linkUrlInput.value || "");
  if (!url) return;
  const label = (linkLabelInput.value || "").trim() || url;

  if (editingLink) {
    editingLink.href = url;
    editingLink.target = "_blank";
    editingLink.rel = "noopener";
    editingLink.textContent = label;
  } else {
    if (linkRange) {
      const selection = window.getSelection();
      editor.focus();
      selection.removeAllRanges();
      selection.addRange(linkRange);
    }
    const link = document.createElement("a");
    link.href = url;
    link.target = "_blank";
    link.rel = "noopener";
    link.textContent = label;
    insertNodeAtCursor(link);
  }
  linkRange = null;
  editingLink = null;
  persistEditorChange();
  linkDialog.close();
}

function normalizeEditorBlocks() {
  for (const node of Array.from(editor.childNodes)) {
    if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
      const p = document.createElement("p");
      p.textContent = node.textContent;
      editor.replaceChild(p, node);
    }
  }
}

function isSectionHeading(node) {
  return node?.nodeType === Node.ELEMENT_NODE && node.tagName.toLowerCase() === "h3" && node.dataset.section;
}

function legacySectionFor(node) {
  if (node?.nodeType !== Node.ELEMENT_NODE || node.tagName.toLowerCase() !== "h3") return "";
  const label = (node.textContent || "").trim().toLowerCase();
  const aliases = {
    green: "green",
    greens: "green",
    greessn: "green",
    concern: "concerns",
    concerns: "concerns",
    "red flag": "red-flags",
    "red flags": "red-flags",
    pov: "point-of-view",
    "point of view": "point-of-view",
  };
  return aliases[label] || "";
}

function isEmptyBlock(node) {
  return node?.nodeType === Node.ELEMENT_NODE && !node.querySelector("img") && !(node.textContent || "").trim();
}

function cleanLoadedDraft() {
  const blocks = Array.from(editor.children);
  const meaningfulBlocks = blocks.filter(node => !isEmptyBlock(node));
  const legacySections = meaningfulBlocks.filter(node => legacySectionFor(node));
  const onlyLegacySectionScaffold = legacySections.length && legacySections.length === meaningfulBlocks.length;

  if (onlyLegacySectionScaffold) {
    editor.innerHTML = "";
    clearDraftRecord();
    return;
  }

  for (const node of legacySections) {
    const section = legacySectionFor(node);
    node.dataset.section = section;
    node.textContent = SECTION_LABELS[section];
  }
}

function currentTopLevelBlock() {
  normalizeEditorBlocks();
  const selection = window.getSelection();
  let node = selection && selection.rangeCount ? selection.getRangeAt(0).commonAncestorContainer : null;
  if (node?.nodeType === Node.TEXT_NODE) node = node.parentElement;
  while (node && node !== editor && node.parentElement !== editor) node = node.parentElement;
  if (node && node !== editor) return node;
  return editor.lastElementChild;
}

function replaceBlock(block, node) {
  if (block && block !== editor) {
    block.replaceWith(node);
  } else {
    editor.appendChild(node);
  }
}

function blankParagraph() {
  const p = document.createElement("p");
  p.appendChild(document.createElement("br"));
  return p;
}

function emptyBlock(tag) {
  const node = document.createElement(tag);
  node.appendChild(document.createElement("br"));
  return node;
}

function transformMarkdownShortcut(event) {
  if (event.key !== " " && event.key !== "Enter") return false;
  const block = currentTopLevelBlock();
  if (!block || block === editor) return false;
  const text = (block.innerText || block.textContent || "").replace(/\u00a0/g, " ").trim();
  const spaceOnly = event.key === " ";
  const enterOrSpace = event.key === " " || event.key === "Enter";
  let next = null;
  let caret = null;

  if (spaceOnly && text === "#") {
    next = emptyBlock("h2");
    caret = next;
  } else if (spaceOnly && text === "##") {
    next = emptyBlock("h3");
    caret = next;
  } else if (spaceOnly && text === "###") {
    next = emptyBlock("h4");
    caret = next;
  } else if (spaceOnly && text === "-") {
    next = document.createElement("ul");
    caret = emptyBlock("li");
    next.appendChild(caret);
  } else if (spaceOnly && text === ">") {
    next = document.createElement("blockquote");
    caret = blankParagraph();
    next.appendChild(caret);
  } else if (enterOrSpace && text === "---") {
    next = document.createElement("hr");
    caret = blankParagraph();
  }

  if (!next) return false;
  event.preventDefault();
  replaceBlock(block, next);
  if (next.tagName?.toLowerCase() === "hr") next.after(caret);
  placeCaretIn(caret);
  persistEditorChange();
  return true;
}

function placeCaretIn(node) {
  editor.focus();
  const range = document.createRange();
  range.selectNodeContents(node);
  range.collapse(false);
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);
  rememberSelection();
}

function labelCurrentThought(section) {
  const label = SECTION_LABELS[section];
  if (!label) return;
  if (showingPreview) setPreview(false);
  restoreSelection();

  let block = currentTopLevelBlock();
  if (!block) {
    block = blankParagraph();
    editor.appendChild(block);
  }

  if (isSectionHeading(block)) {
    block.dataset.section = section;
    block.textContent = label;
    persistDraft();
    updatePreview();
    return;
  }

  const heading = document.createElement("h3");
  heading.dataset.section = section;
  heading.textContent = label;

  const previous = block.previousElementSibling;
  if (isSectionHeading(previous)) {
    previous.dataset.section = section;
    previous.textContent = label;
  } else {
    block.before(heading);
  }

  const text = block.innerText?.trim() || "";
  const hasMedia = Boolean(block.querySelector?.("img"));
  if (text || hasMedia) {
    const next = blankParagraph();
    block.after(next);
    placeCaretIn(next);
  } else {
    placeCaretIn(block);
  }

  persistDraft();
  updateMeta();
  updatePreview();
  hideChromeSoon(900);
}

function sectionHeading(section) {
  const h = document.createElement("h3");
  h.dataset.section = section;
  h.textContent = SECTION_LABELS[section];
  return h;
}

function textParagraph(text) {
  const p = document.createElement("p");
  p.textContent = text;
  return p;
}

function appendTemplateLine(fragment, line) {
  if (line.type === "section") {
    fragment.appendChild(sectionHeading(line.section));
    return null;
  }
  if (line.type === "text") {
    fragment.appendChild(textParagraph(line.text));
    return null;
  }
  const p = blankParagraph();
  fragment.appendChild(p);
  return p;
}

function insertStructureTemplate(type) {
  if (showingPreview) setPreview(false);
  restoreSelection();
  const templates = {
    daily: [
      { type: "section", section: "green" },
      { type: "blank" },
      { type: "section", section: "concerns" },
      { type: "blank" },
      { type: "section", section: "red-flags" },
      { type: "blank" },
      { type: "section", section: "point-of-view" },
      { type: "blank" },
    ],
    concern: [
      { type: "section", section: "concerns" },
      { type: "text", text: "What is happening:" },
      { type: "blank" },
      { type: "text", text: "How I am thinking about it:" },
      { type: "blank" },
      { type: "text", text: "What I need:" },
      { type: "blank" },
    ],
    "red-flag": [
      { type: "section", section: "red-flags" },
      { type: "text", text: "What is stuck:" },
      { type: "blank" },
      { type: "text", text: "Why it matters:" },
      { type: "blank" },
      { type: "text", text: "Decision or help needed:" },
      { type: "blank" },
    ],
    pov: [
      { type: "section", section: "point-of-view" },
      { type: "text", text: "My read:" },
      { type: "blank" },
      { type: "text", text: "Why I think this:" },
      { type: "blank" },
      { type: "text", text: "What I would push for:" },
      { type: "blank" },
    ],
  };
  const lines = templates[type];
  if (!lines) return;
  const fragment = document.createDocumentFragment();
  let firstBlank = null;
  for (const line of lines) {
    const blank = appendTemplateLine(fragment, line);
    if (!firstBlank && blank) firstBlank = blank;
  }
  insertFragmentAtCursor(fragment);
  if (firstBlank) placeCaretIn(firstBlank);
  persistEditorChange();
  hideChromeSoon(900);
}

function markdownInline(node, assetMap) {
  if (node.nodeType === Node.TEXT_NODE) return node.textContent.replace(/\u00a0/g, " ");
  if (node.nodeType !== Node.ELEMENT_NODE) return "";
  const tag = node.tagName.toLowerCase();
  if (tag === "br") return "\n";
  if (tag === "a") {
    const label = Array.from(node.childNodes).map(child => markdownInline(child, assetMap)).join("").trim() || node.href;
    return `[${label}](${node.getAttribute("href") || node.href})`;
  }
  if (tag === "strong" || tag === "b") {
    return `**${Array.from(node.childNodes).map(child => markdownInline(child, assetMap)).join("").trim()}**`;
  }
  if (tag === "em" || tag === "i") {
    return `*${Array.from(node.childNodes).map(child => markdownInline(child, assetMap)).join("").trim()}*`;
  }
  if (tag === "code") {
    return `\`${node.textContent.trim()}\``;
  }
  if (tag === "img") {
    const src = assetMap.get(node) || node.getAttribute("src") || "";
    const alt = node.getAttribute("alt") || "";
    return `![${alt}](${src})`;
  }
  return Array.from(node.childNodes).map(child => markdownInline(child, assetMap)).join("");
}

function isBlockTag(tag) {
  return ["blockquote", "div", "figure", "h1", "h2", "h3", "h4", "hr", "li", "ol", "p", "ul"].includes(tag);
}

function markdownBlock(node, assetMap) {
  if (node.nodeType === Node.TEXT_NODE) return node.textContent.trim();
  if (node.nodeType !== Node.ELEMENT_NODE) return "";
  const tag = node.tagName.toLowerCase();
  if (tag === "figure") {
    const img = node.querySelector("img");
    if (!img) return "";
    const caption = (node.querySelector("figcaption")?.innerText || img.alt || "").trim();
    const src = assetMap.get(img) || img.getAttribute("src") || "";
    const size = IMAGE_SIZES.includes(node.dataset.imageSize) && node.dataset.imageSize !== "full" ? ` "${node.dataset.imageSize}"` : "";
    return `![${caption}](${src}${size})`;
  }
  if (tag === "img") return markdownInline(node, assetMap);
  if (tag === "h1" || tag === "h2") return `# ${markdownInline(node, assetMap).trim()}`;
  if (tag === "h3") return `## ${markdownInline(node, assetMap).trim()}`;
  if (tag === "h4") return `### ${markdownInline(node, assetMap).trim()}`;
  if (tag === "ul" || tag === "ol") {
    return Array.from(node.children).filter(child => child.tagName.toLowerCase() === "li").map(li => `- ${markdownInline(li, assetMap).trim()}`).join("\n");
  }
  if (tag === "blockquote") {
    return Array.from(node.childNodes).map(child => markdownBlock(child, assetMap)).filter(Boolean).map(line => `> ${line}`).join("\n");
  }
  if (tag === "hr") return "---";
  if (tag === "p" || tag === "div" || tag === "li") {
    const nestedBlocks = Array.from(node.children).filter(child => isBlockTag(child.tagName.toLowerCase()));
    if (nestedBlocks.length) {
      return Array.from(node.childNodes).map(child => markdownBlock(child, assetMap)).filter(Boolean).join("\n\n");
    }
    return markdownInline(node, assetMap).trim();
  }
  return Array.from(node.childNodes).map(child => markdownBlock(child, assetMap)).filter(Boolean).join("\n\n");
}

function editorToMarkdown(assetMap = new Map()) {
  return Array.from(editor.childNodes).map(node => markdownBlock(node, assetMap)).filter(Boolean).join("\n\n").trim();
}

function linkCountFromMarkdown(markdown) {
  const markdownLinks = markdown.match(/\[[^\]]+\]\(https?:\/\/[^)\s]+\)/g) || [];
  const standaloneLinks = markdown.match(/^https?:\/\/[^\s<]+$/gm) || [];
  return markdownLinks.length + standaloneLinks.length;
}

function detectedSections(markdown) {
  const seen = [];
  for (const line of markdown.split("\n")) {
    if (!line.startsWith("## ")) continue;
    const label = line.slice(3).trim();
    const key = sectionKey(label);
    if (key && !seen.includes(SECTION_LABELS[key])) seen.push(SECTION_LABELS[key]);
  }
  return seen;
}

function updatePreviewMeta(markdown) {
  if (!markdown) {
    previewMeta.textContent = "";
    return;
  }
  const words = (markdown.replace(/!\[[^\]]*\]\([^)]+\)/g, "").match(/\S+/g) || []).length;
  const images = imageCount();
  const links = linkCountFromMarkdown(markdown);
  const sections = detectedSections(markdown);
  const parts = [
    words === 1 ? "1 word" : `${words} words`,
    images === 1 ? "1 image" : `${images} images`,
    links === 1 ? "1 link" : `${links} links`,
  ];
  if (sections.length) parts.push(`Sections: ${sections.join(", ")}`);
  previewMeta.textContent = parts.join(" · ");
}

function updatePreview() {
  if (!showingPreview) return;
  const markdown = editorToMarkdown();
  updatePreviewMeta(markdown);
  previewBody.innerHTML = markdown ? mdToHtml(markdown) : '<p class="empty">Nothing to preview.</p>';
}

function setPreview(on) {
  showingPreview = on;
  document.body.classList.toggle("is-reading", on);
  editor.hidden = on;
  previewPanel.hidden = !on;
  previewButton.textContent = on ? "Write" : "Preview";
  previewCommandButton.textContent = on ? "Write" : "Preview";
  if (on) updatePreview();
  if (!on) {
    editor.focus();
    rememberSelection();
  }
}

function persistDraft() {
  const html = editor.innerHTML;
  const context = draftContext();
  try {
    localStorage.setItem(STORAGE.draft, html);
    writeJson(STORAGE.draftContext, context);
  } catch {}
  saveDraftRecord(html, context);
}

function revealChrome(duration = 2600) {
  clearTimeout(chromeTimer);
  document.body.classList.remove("chrome-suppressed");
  document.body.classList.add("chrome-visible");
  if (duration) chromeTimer = setTimeout(() => document.body.classList.remove("chrome-visible"), duration);
}

function scheduleChromeHide(delay = 700) {
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(() => document.body.classList.remove("chrome-visible"), delay);
}

function hideChromeSoon(delay = 700) {
  document.body.classList.add("chrome-suppressed");
  scheduleChromeHide(delay);
}

function hideMenus() {
  commandMenu.hidden = true;
  commandMenu.style.top = "";
  commandMenu.style.bottom = "";
  commandMenu.style.left = "";
  commandButton.setAttribute("aria-expanded", "false");
  commandReturnFocus = null;
}

function visibleCommandItems() {
  return Array.from(commandMenu.querySelectorAll("button")).filter(button => {
    const section = button.closest(".menu-section");
    return !button.disabled && button.offsetParent !== null && !section?.hidden;
  });
}

function focusCommandItem(index = 0) {
  const items = visibleCommandItems();
  if (!items.length) return;
  const next = ((index % items.length) + items.length) % items.length;
  items[next].focus();
}

function focusNextCommandItem(direction) {
  const items = visibleCommandItems();
  if (!items.length) return;
  const current = items.indexOf(document.activeElement);
  focusCommandItem(current === -1 ? 0 : current + direction);
}

function closeCommandMenu({ restoreFocus = true } = {}) {
  const target = commandReturnFocus;
  hideMenus();
  if (restoreFocus && target) target.focus();
  commandReturnFocus = null;
}

function toggleMenu(menu, button) {
  const wasHidden = menu.hidden;
  hideMenus();
  if (!wasHidden) return;
  const rect = button.getBoundingClientRect();
  menu.hidden = false;
  menu.style.top = "";
  menu.style.bottom = "68px";
  menu.style.left = `${Math.max(12, Math.min(rect.left, window.innerWidth - menu.offsetWidth - 12))}px`;
  button.setAttribute("aria-expanded", "true");
  commandReturnFocus = button;
  focusCommandItem(0);
  revealChrome(0);
}

function caretRect() {
  const selection = window.getSelection();
  if (!selection || !selection.rangeCount) return null;
  const range = selection.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return null;
  const rect = range.getBoundingClientRect();
  if (rect.width || rect.height) return rect;

  const marker = document.createElement("span");
  marker.textContent = "\u200b";
  marker.style.cssText = "display:inline-block;width:0;overflow:hidden;";
  const markerRange = range.cloneRange();
  markerRange.insertNode(marker);
  const markerRect = marker.getBoundingClientRect();
  marker.remove();
  selection.removeAllRanges();
  selection.addRange(range);
  rememberSelection();
  return markerRect;
}

function openCommandMenuAtCaret() {
  const rect = caretRect() || editor.getBoundingClientRect();
  hideMenus();
  commandMenu.hidden = false;
  commandMenu.style.bottom = "auto";
  const top = Math.min(rect.bottom + 8, window.innerHeight - commandMenu.offsetHeight - 12);
  const left = Math.min(Math.max(12, rect.left), window.innerWidth - commandMenu.offsetWidth - 12);
  commandMenu.style.top = `${Math.max(12, top)}px`;
  commandMenu.style.left = `${Math.max(12, left)}px`;
  commandButton.setAttribute("aria-expanded", "true");
  commandReturnFocus = editor;
  focusCommandItem(0);
}

function setLocalControls() {
  localModeIndicator.hidden = !LOCAL_ONLY;
}

function showLocalModeInfo() {
  window.alert("Done saves locally in this browser. Nothing is pushed to GitHub.");
}

function localDraftEntry(body) {
  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const beatId = `${date}-${author}-${localTime(now)}`;
  const status = inferStatus(editorText());

async function getGitHubContent(path, token) {
  const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`, {
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "X-GitHub-Api-Version": "2022-11-28",
    },
  });

  if (!response.ok) {
    let detail = "";
    try {
      const json = await response.json();
      detail = json.message ? ` ${json.message}` : "";
    } catch {}
    throw new Error(`GitHub could not read the update.${detail}`);
  }
  return response.json();
}

async function putGitHubContent(path, base64Content, message, token, sha = "") {
  const body = {
    message,
    content: base64Content,
    branch: BRANCH,
  };
  if (sha) body.sha = sha;

  const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: JSON.stringify(body),
  });

  if (!response.ok) {
    let detail = "";
    try {
      const json = await response.json();
      detail = json.message ? ` ${json.message}` : "";
    } catch {}
    throw new Error(`GitHub rejected the save.${detail}`);
  }
}

async function uploadImages(token, beatId, date) {
  const images = Array.from(editor.querySelectorAll("img")).filter(img => (img.getAttribute("src") || "").startsWith("data:image/"));
  const assetMap = new Map();
  let index = 0;
  for (const img of images) {
    index += 1;
    const src = img.getAttribute("src");
    const filename = `${pad(index)}-${slugFileName(img.dataset.filename)}`;
    const path = `assets/updates/${beatId}/${filename}`;
    const base64 = src.slice(src.indexOf(",") + 1);
    meta.textContent = images.length === 1 ? "Uploading image" : `Uploading image ${index} of ${images.length}`;
    await putGitHubContent(path, base64, `asset: ${date} ${filename}`, token);
    assetMap.set(img, path);
  }
  return assetMap;
}

function editedEntry(edit, body, status) {
  const author = edit.author || safeAuthor();
  const date = edit.date || localDate();
  const id = edit.id || `${date}-${author}-${localTime()}`;
  return {
    id,
    path: edit.path || `updates/${id}.md`,
    author,
    date,
    status,
    markdown: body,
    html: mdToHtml(body),
  };
}

function saveLocalEntryEdit(entry) {
  const entries = readJson(STORAGE.localEntries, []);
  const index = entries.findIndex(item => item.id === entry.id);
  const next = { ...entry, path: entry.path || `local/${entry.id}` };
  if (index === -1) entries.unshift(next);
  else entries[index] = { ...entries[index], ...next };
  writeJson(STORAGE.localEntries, entries.slice(0, 30));
}

function saveLocalOverride(entry) {
  const overrides = readJson(STORAGE.localOverrides, []);
  const key = entry.path || entry.id;
  const index = overrides.findIndex(item => (item.path || item.id) === key);
  const next = { ...entry, path: key };
  if (index === -1) overrides.unshift(next);
  else overrides[index] = { ...overrides[index], ...next };
  writeJson(STORAGE.localOverrides, overrides.slice(0, 60));
}

async function saveEditedBeat(edit) {
  const token = localStorage.getItem(STORAGE.token);
  const date = edit.date || localDate();
  const author = edit.author || safeAuthor();
  const beatId = edit.id || `${date}-${author}-${localTime()}`;
  const assetMap = !LOCAL_ONLY && token ? await uploadImages(token, beatId, date) : new Map();
  const body = editorToMarkdown(assetMap);
  const status = inferStatus(editorText());
  const entry = editedEntry({ ...edit, id: beatId, date, author }, body, status);
  const markdown = buildMarkdown(body, entry.date, status, entry.author);

  if (edit.source === "local") {
    saveLocalEntryEdit(entry);
    return { path: entry.path, markdown };
  }

  if (LOCAL_ONLY) {
    saveLocalOverride(entry);
    return { path: entry.path, markdown };
  }

  if (!token) throw new Error("setup");
  const path = edit.path || entry.path;
  const existing = await getGitHubContent(path, token);
  await putGitHubContent(path, bytesToBase64(markdown), `edit beat: ${entry.author} ${entry.date}`, token, existing.sha);
  saveLocalOverride({ ...entry, path });
  return { path, markdown };
}

async function publishBeat() {
  if (currentEdit) return saveEditedBeat(currentEdit);
  if (LOCAL_ONLY) return publishLocalBeat();

  const token = localStorage.getItem(STORAGE.token);
  if (!token) throw new Error("setup");

  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const beatId = `${date}-${author}-${localTime(now)}`;
  const path = `updates/${beatId}.md`;
  const assetMap = await uploadImages(token, beatId, date);
  const body = editorToMarkdown(assetMap);
  const markdown = buildMarkdown(body, date, inferStatus(editorText()), author);
  await putGitHubContent(path, bytesToBase64(markdown), `beat: ${author} ${date}`, token);

  return { path, markdown };
}

function publishLocalBeat() {
  const body = editorToMarkdown();
  const entry = localDraftEntry(body);
  const markdown = buildMarkdown(body, entry.date, entry.status, entry.author);
  const entries = JSON.parse(localStorage.getItem(STORAGE.localEntries) || "[]");
  entries.unshift(entry);
  try {
    localStorage.setItem(STORAGE.localEntries, JSON.stringify(entries.slice(0, 30)));
  } catch {
    throw new Error("Local save is too large. Remove one image and try again.");
  }
  return { path: "local", markdown };
}

function openSettings() {
  authorInput.value = localStorage.getItem(STORAGE.author) || "amit";
  tokenInput.value = localStorage.getItem(STORAGE.token) || "";
  settingsDialog.showModal();
  setTimeout(() => tokenInput.focus(), 0);
}

function openImagePicker() {
  restoreSelection();
  imageInput.click();
}

function toggleCommandMenu() {
  toggleMenu(commandMenu, commandButton);
}

saveSettingsButton.addEventListener("click", () => {
  localStorage.setItem(STORAGE.author, authorInput.value.trim() || "amit");
  if (tokenInput.value.trim()) localStorage.setItem(STORAGE.token, tokenInput.value.trim());
  settingsDialog.close();
  updateMeta();
  editor.focus();
});

forgetButton.addEventListener("click", () => {
  localStorage.removeItem(STORAGE.token);
  tokenInput.value = "";
  updateMeta();
});

function focusInSettingsInput() {
  const el = document.activeElement;
  return el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA") && !editor.contains(el);
}

function updateSelectionToolbar() {
  const range = selectionInsideEditor();
  if (!range || showingPreview) {
    selectionToolbar.hidden = true;
    return;
  }
  const rect = range.getBoundingClientRect();
  if (!rect.width && !rect.height) {
    selectionToolbar.hidden = true;
    return;
  }
  selectionToolbar.hidden = false;
  const top = Math.max(8, rect.top - 42);
  const left = Math.max(8, Math.min(rect.left + rect.width / 2 - selectionToolbar.offsetWidth / 2, window.innerWidth - selectionToolbar.offsetWidth - 8));
  selectionToolbar.style.top = `${top}px`;
  selectionToolbar.style.left = `${left}px`;
}

function handleShortcut(event) {
  const mod = event.metaKey || event.ctrlKey;
  if (event.key === "Escape") {
    if (linkDialog.open) linkDialog.close();
    else if (settingsDialog.open) settingsDialog.close();
    else if (!commandMenu.hidden) closeCommandMenu();
    else if (showingPreview) setPreview(false);
    return;
  }
  if (focusInSettingsInput()) return;
  if (!mod) return;

  const key = event.key.toLowerCase();
  if (key === "b") {
    event.preventDefault();
    wrapSelection("strong");
  } else if (key === "i") {
    event.preventDefault();
    wrapSelection("em");
  } else if (key === "k") {
    event.preventDefault();
    openLinkDialog();
  } else if (event.shiftKey && key === "p") {
    event.preventDefault();
    setPreview(!showingPreview);
  } else if (event.key === "Enter") {
    event.preventDefault();
    doneButton.click();
  } else if (key === "/" || event.code === "Slash") {
    event.preventDefault();
    toggleCommandMenu();
  } else if (["1", "2", "3", "4"].includes(event.key)) {
    event.preventDefault();
    const sections = ["green", "concerns", "red-flags", "point-of-view"];
    labelCurrentThought(sections[Number(event.key) - 1]);
  }
}

document.addEventListener("selectionchange", () => {
  rememberSelection();
  updateSelectionToolbar();
});

document.addEventListener("keydown", handleShortcut);

editor.addEventListener("input", () => {
  persistDraft();
  updateMeta();
  updatePreview();
  hideChromeSoon(900);
});

editor.addEventListener("keydown", (event) => {
  if (event.key === "/" && !event.metaKey && !event.ctrlKey && !event.altKey) {
    event.preventDefault();
    openCommandMenuAtCaret();
    return;
  }
  transformMarkdownShortcut(event);
});

window.addEventListener("pagehide", () => {
  if (!editorIsEmpty()) persistDraft();
});

editor.addEventListener("paste", async (event) => {
  const items = Array.from(event.clipboardData?.items || []);
  const imageFiles = items.filter(item => item.type.startsWith("image/")).map(item => item.getAsFile()).filter(Boolean);
  const html = event.clipboardData?.getData("text/html") || "";
  const plain = event.clipboardData?.getData("text/plain") || "";
  if (!imageFiles.length && !plain && !html) return;
  const pastedLink = firstClipboardLink(html, plain);
  if (!imageFiles.length && pastedLink && linkSelectedText(pastedLink)) {
    event.preventDefault();
    return;
  }
  event.preventDefault();
  if (imageFiles.length) await insertImageFiles(imageFiles);
  const text = html.includes("<a") ? cleanClipboardHtml(html) : plain;
  if (text.trim()) insertCleanText(text);
});

editor.addEventListener("dragover", (event) => {
  event.preventDefault();
  editor.classList.add("is-drop-target");
});

editor.addEventListener("dragleave", () => {
  editor.classList.remove("is-drop-target");
});

editor.addEventListener("drop", async (event) => {
  event.preventDefault();
  editor.classList.remove("is-drop-target");
  const files = Array.from(event.dataTransfer?.files || []).filter(file => file.type.startsWith("image/"));
  await insertImageFiles(files);
});

imageInput.addEventListener("change", async () => {
  await insertImageFiles(Array.from(imageInput.files || []));
  imageInput.value = "";
});

linkForm.addEventListener("submit", (event) => {
  event.preventDefault();
  applyLinkFromDialog();
});

cancelLinkButton.addEventListener("click", () => linkDialog.close());

linkDialog.addEventListener("close", () => {
  linkRange = null;
  editingLink = null;
});

selectionToolbar.addEventListener("mousedown", event => event.preventDefault());

selectionToolbar.addEventListener("click", event => {
  const button = event.target.closest("[data-format-action]");
  if (!button) return;
  const action = button.dataset.formatAction;
  if (action === "bold") wrapSelection("strong");
  if (action === "italic") wrapSelection("em");
  if (action === "code") wrapSelection("code");
  if (action === "quote") quoteSelection();
  if (action === "link") openLinkDialog();
});

editor.addEventListener("click", event => {
  const button = event.target.closest("[data-image-action]");
  if (!button) return;
  event.preventDefault();
  resizeImageFigure(button.closest("figure"), button.dataset.imageAction);
});

localModeIndicator.addEventListener("click", showLocalModeInfo);

commandButton.addEventListener("click", toggleCommandMenu);

commandMenu.addEventListener("mousedown", event => event.preventDefault());

commandMenu.addEventListener("keydown", event => {
  if (event.key === "ArrowDown") {
    event.preventDefault();
    focusNextCommandItem(1);
  } else if (event.key === "ArrowUp") {
    event.preventDefault();
    focusNextCommandItem(-1);
  } else if (event.key === "Home") {
    event.preventDefault();
    focusCommandItem(0);
  } else if (event.key === "End") {
    event.preventDefault();
    focusCommandItem(visibleCommandItems().length - 1);
  } else if (event.key === "Enter" || event.key === " ") {
    event.preventDefault();
    document.activeElement?.click();
  } else if (event.key === "Escape") {
    event.preventDefault();
    closeCommandMenu();
  }
});

commandMenu.addEventListener("click", async event => {
  const button = event.target.closest("button");
  if (!button) return;
  const command = button.dataset.command;

  if (button.dataset.sectionCommand) {
    closeCommandMenu({ restoreFocus: false });
    labelCurrentThought(button.dataset.sectionCommand);
  } else if (button.dataset.insertTemplate) {
    closeCommandMenu({ restoreFocus: false });
    insertStructureTemplate(button.dataset.insertTemplate);
  } else if (command === "add-image") {
    closeCommandMenu({ restoreFocus: false });
    openImagePicker();
  } else if (command === "add-link") {
    closeCommandMenu({ restoreFocus: false });
    openLinkDialog();
  } else if (command === "past-updates") {
    location.href = "./archive.html";
  } else if (command === "setup") {
    closeCommandMenu({ restoreFocus: false });
    openSettings();
  } else if (command === "preview") {
    closeCommandMenu({ restoreFocus: false });
    setPreview(!showingPreview);
  }
});

document.addEventListener("pointerdown", event => {
  if (event.target.closest(".menu-popover") || event.target.closest("#commandButton")) return;
  closeCommandMenu({ restoreFocus: false });
});

chromeHotspot.addEventListener("pointerenter", () => revealChrome(0));
chromeHotspot.addEventListener("pointerdown", () => revealChrome(3500));
chromeHotspot.addEventListener("pointerleave", () => document.body.classList.remove("chrome-suppressed"));
footerBar.addEventListener("pointerenter", () => revealChrome(0));
footerBar.addEventListener("pointerleave", () => {
  document.body.classList.remove("chrome-suppressed");
  scheduleChromeHide(1200);
});

previewButton.addEventListener("click", () => setPreview(!showingPreview));

doneButton.addEventListener("click", async () => {
  if (showingPreview) setPreview(false);

  if (editorIsEmpty()) {
    editor.focus();
    return;
  }

  if (!LOCAL_ONLY && !hasToken()) {
    meta.textContent = "Setup needed";
    openSettings();
    return;
  }

  doneButton.disabled = true;
  meta.textContent = "Saving";
  try {
    const wasEditing = Boolean(currentEdit);
    await publishBeat();
    editor.innerHTML = "";
    await clearDraftRecord();
    localStorage.removeItem(STORAGE.editing);
    currentEdit = null;
    meta.textContent = wasEditing ? LOCAL_ONLY ? "Saved edit locally. Nothing was pushed." : "Update saved." : LOCAL_ONLY ? "Saved locally. Nothing was pushed." : "Done. Publishing now.";
  } catch (error) {
    if (error.message === "setup") {
      meta.textContent = "Setup needed";
      openSettings();
    } else {
      meta.textContent = error.message || "Could not save.";
    }
  } finally {
    doneButton.disabled = false;
  }
});

async function loadInitialContent() {
  currentEdit = readJson(STORAGE.editing, null);
  const savedDraft = await loadDraftRecord();
  const draft = savedDraft && contextMatchesCurrent(savedDraft.context) ? savedDraft.html : "";
  if (currentEdit) {
    editor.innerHTML = draft || currentEdit.html || mdToHtml(currentEdit.markdown || "");
    ensureImageControls();
    if (!draft) persistDraft();
    return;
  }

  editor.innerHTML = draft;
  cleanLoadedDraft();
  ensureImageControls();
}

loadInitialContent().then(() => {
  setLocalControls();
  setFooterDate();
  updateMeta();
  setTimeout(() => editor.focus(), 0);
});
</script>
</body>
</html>
