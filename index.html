<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heartbeats</title>
<style>
  :root {
    --page: #fff;
    --ink: #1f1f1f;
    --muted: #666;
    --quiet: #8a8a8a;
    --line: #e6e6e6;
    --soft: #f7f7f7;
    --soft-hover: #f0f0f0;
    --focus: #111;
    --max: 760px;
    --measure: 66ch;
  }

  * {
    box-sizing: border-box;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  a {
    color: inherit;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .shell {
    min-height: 100vh;
  }

  .topbar {
    border-bottom: 1px solid var(--line);
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    max-width: calc(var(--max) + 96px);
    margin: 0 auto;
    padding: 14px 24px;
  }

  .crumb {
    display: flex;
    align-items: center;
    gap: 9px;
    min-width: 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.3;
  }

  .crumb a,
  .crumb span {
    white-space: nowrap;
  }

  .crumb .current {
    color: var(--ink);
    font-weight: 600;
  }

  .actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: none;
  }

  .text-link,
  .action-link {
    min-height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    text-decoration: none;
  }

  .text-link {
    color: var(--muted);
  }

  .text-link:hover {
    color: var(--ink);
  }

  .action-link {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0 14px;
    font-weight: 600;
  }

  .action-link:hover {
    background: var(--soft);
  }

  .page {
    max-width: var(--max);
    margin: 0 auto;
    padding: 72px 24px 96px;
  }

  header {
    margin-bottom: 48px;
  }

  h1 {
    margin: 0;
    color: var(--ink);
    font-size: 42px;
    font-weight: 650;
    letter-spacing: 0;
    line-height: 1.12;
    text-wrap: balance;
  }

  .lede {
    max-width: var(--measure);
    margin: 14px 0 0;
    color: var(--muted);
    font-size: 19px;
    line-height: 1.55;
    text-wrap: pretty;
  }

  .week {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 12px 18px;
    margin: 0 0 28px;
    padding: 16px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .week-label {
    color: var(--quiet);
    font-size: 14px;
  }

  .person {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    color: var(--ink);
    font-size: 15px;
  }

  .person .state {
    color: var(--muted);
  }

  .person.out {
    color: var(--muted);
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 0 0 28px;
  }

  .filter {
    min-height: 40px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font: inherit;
    font-size: 14px;
    line-height: 1;
    padding: 0 12px;
  }

  .filter:hover {
    background: var(--soft);
    color: var(--ink);
  }

  .filter.active {
    background: var(--soft-hover);
    color: var(--ink);
    font-weight: 600;
  }

  .beat {
    padding: 38px 0 44px;
    border-top: 1px solid var(--line);
  }

  .beat:first-child {
    border-top: 0;
    padding-top: 0;
  }

  .beat-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 26px;
  }

  .beat-title {
    min-width: 0;
  }

  .author {
    display: block;
    color: var(--ink);
    font-size: 24px;
    font-weight: 650;
    line-height: 1.2;
  }

  .when {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.4;
  }

  .status {
    flex: none;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.4;
    white-space: nowrap;
  }

  .beat-body {
    max-width: var(--measure);
  }

  .beat-body h3 {
    margin: 30px 0 8px;
    color: var(--ink);
    font-size: 17px;
    font-weight: 650;
    line-height: 1.35;
    text-wrap: balance;
  }

  .beat-body h3:first-child {
    margin-top: 0;
  }

  .beat-body p {
    margin: 0 0 14px;
    text-wrap: pretty;
  }

  .beat-body ul {
    margin: 0 0 18px;
    padding-left: 1.25em;
  }

  .beat-body li {
    margin: 0 0 10px;
    padding-left: .1em;
    text-wrap: pretty;
  }

  .beat-body strong {
    color: var(--ink);
    font-weight: 650;
  }

  .beat-body code,
  code {
    border-radius: 4px;
    background: var(--soft);
    color: var(--ink);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: .86em;
    padding: 2px 5px;
  }

  .empty {
    max-width: var(--measure);
    margin: 0;
    padding: 36px 0;
    color: var(--muted);
    font-size: 17px;
  }

  footer {
    max-width: var(--measure);
    margin-top: 54px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    color: var(--quiet);
    font-size: 13px;
    line-height: 1.55;
  }

  @media (max-width: 640px) {
    .topbar-inner {
      align-items: flex-start;
      padding: 12px 18px;
    }

    .actions {
      gap: 4px;
    }

    .text-link {
      display: none;
    }

    .action-link {
      min-height: 38px;
      padding: 0 12px;
    }

    .page {
      padding: 48px 18px 72px;
    }

    h1 {
      font-size: 34px;
    }

    .lede {
      font-size: 18px;
    }

    .beat-head {
      display: block;
    }

    .status {
      display: block;
      margin-top: 8px;
      white-space: normal;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <nav class="topbar" aria-label="Primary">
      <div class="topbar-inner">
        <div class="crumb">
          <a href="https://amitdialpad.github.io/house-of-air/">Amit Ayre</a>
          <span aria-hidden="true">/</span>
          <span class="current">Heartbeats</span>
        </div>
        <div class="actions">
          <a class="text-link" href="https://github.com/amitdialpad/heartbeats">Repo</a>
          <a class="action-link" href="https://github.com/amitdialpad/heartbeats/issues/new/choose">New beat</a>
        </div>
      </div>
    </nav>

    <main class="page">
      <header>
        <h1>Heartbeats</h1>
        <p class="lede">Written updates between Amit and Josh.</p>
      </header>

      <section class="week" id="roster" aria-label="This week"></section>
      <div class="filters" id="filters" aria-label="Filter beats"></div>
      <section id="feed" aria-label="Beats"></section>

      <footer>
        <span id="gen"></span>
      </footer>
    </main>
  </div>

<script>
const NAMES = { amit: "Amit", josh: "Josh" };
const cap = s => NAMES[s] || (s ? s[0].toUpperCase() + s.slice(1) : "");
const fmtDate = d => {
  const dt = new Date(d + "T00:00:00");
  return isNaN(dt) ? d : dt.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
};
let DATA = { entries: [] };
let filter = "all";

function startOfWeek() {
  const n = new Date();
  const day = (n.getDay() + 6) % 7;
  n.setHours(0, 0, 0, 0);
  n.setDate(n.getDate() - day);
  return n;
}

function renderRoster() {
  const people = ["amit", "josh"];
  const since = startOfWeek();
  const posted = new Set(DATA.entries
    .filter(e => new Date(e.date + "T00:00:00") >= since)
    .map(e => e.author));

  document.getElementById("roster").innerHTML =
    '<span class="week-label">This week</span>' + people.map(p => {
      const on = posted.has(p);
      return `<span class="person ${on ? "in" : "out"}">${cap(p)} <span class="state">${on ? "posted" : "no beat yet"}</span></span>`;
    }).join("");
}

function renderFilters() {
  const defs = [["all", "All"], ["concern", "Concerns"], ["red", "Red flags"], ["amit", "Amit"], ["josh", "Josh"]];
  const el = document.getElementById("filters");
  el.innerHTML = defs
    .map(([k, l]) => `<button class="filter ${filter === k ? "active" : ""}" data-k="${k}" type="button">${l}</button>`)
    .join("");
  el.querySelectorAll(".filter").forEach(b => {
    b.addEventListener("click", () => {
      filter = b.dataset.k;
      renderFilters();
      renderFeed();
    });
  });
}

function match(e) {
  if (filter === "all") return true;
  if (filter === "concern") return e.hasConcerns || e.status === "concern";
  if (filter === "red") return e.hasRedFlags || e.status === "red";
  return e.author === filter;
}

function statusLabel(s) {
  if (s === "red") return "Red flag";
  if (s === "concern") return "Concern";
  return "Fine";
}

function renderFeed() {
  const feed = document.getElementById("feed");
  const list = DATA.entries.filter(match);
  if (!list.length) {
    feed.innerHTML = '<p class="empty">Nothing here yet. The first beat appears after it is posted.</p>';
    return;
  }

  feed.innerHTML = list.map(e => `
    <article class="beat">
      <div class="beat-head">
        <div class="beat-title">
          <span class="author">${cap(e.author)}</span>
          <span class="when">${fmtDate(e.date)}</span>
        </div>
        <span class="status">${statusLabel(e.status)}</span>
      </div>
      <div class="beat-body">${e.html}</div>
    </article>`).join("");
}

fetch("./data/index.json", { cache: "no-store" })
  .then(r => r.json())
  .then(d => {
    DATA = d;
    document.getElementById("gen").textContent = d.generated
      ? "Updated " + new Date(d.generated).toLocaleString()
      : "";
    renderRoster();
    renderFilters();
    renderFeed();
  })
  .catch(() => {
    document.getElementById("feed").innerHTML = '<p class="empty">Could not load beats. Run <code>npm run build</code> first.</p>';
  });
</script>
</body>
</html>
