<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heartbeats</title>
<style>
  :root {
    --page: #fff;
    --ink: #1f1f1f;
    --muted: #666;
    --quiet: #8a8a8a;
    --line: #e6e6e6;
    --soft: #f7f7f7;
    --soft-hover: #f0f0f0;
    --focus: #111;
    --measure: 760px;
  }

  * {
    box-sizing: border-box;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  a {
    color: inherit;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--page);
    border-bottom: 1px solid var(--line);
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    max-width: calc(var(--measure) + 80px);
    margin: 0 auto;
    padding: 13px 24px;
  }

  .brand {
    color: var(--ink);
    font-size: 15px;
    font-weight: 650;
    line-height: 1.2;
    text-decoration: none;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .plain-button {
    min-height: 38px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    padding: 0 10px;
    font-size: 14px;
  }

  .plain-button:hover {
    background: var(--soft);
    color: var(--ink);
  }

  main {
    max-width: var(--measure);
    margin: 0 auto;
    padding: 58px 24px 96px;
  }

  .date-line {
    margin: 0 0 12px;
    color: var(--quiet);
    font-size: 15px;
    line-height: 1.4;
  }

  h1 {
    margin: 0 0 28px;
    color: var(--ink);
    font-size: 42px;
    font-weight: 650;
    letter-spacing: 0;
    line-height: 1.14;
    text-wrap: balance;
  }

  .writer {
    min-height: 56vh;
  }

  .beat-input {
    display: block;
    width: 100%;
    min-height: 48vh;
    resize: none;
    overflow: hidden;
    border: 0;
    background: transparent;
    color: var(--ink);
    padding: 0;
    font-size: 21px;
    line-height: 1.65;
  }

  .beat-input::placeholder {
    color: var(--quiet);
    opacity: 1;
  }

  .beat-input:focus {
    outline: 0;
  }

  .compose-bar {
    position: sticky;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin: 52px 0 0;
    padding: 16px 0;
    background: var(--page);
    border-top: 1px solid var(--line);
  }

  .meta {
    min-height: 22px;
    color: var(--quiet);
    font-size: 14px;
    line-height: 1.4;
  }

  .done-button {
    min-width: 86px;
    min-height: 42px;
    flex: none;
    border: 1px solid var(--ink);
    border-radius: 6px;
    background: var(--ink);
    color: var(--page);
    padding: 0 18px;
    font-size: 15px;
    font-weight: 650;
    line-height: 1;
  }

  .done-button:hover {
    background: #000;
  }

  .done-button:disabled {
    border-color: var(--line);
    background: var(--soft);
    color: var(--quiet);
    cursor: default;
  }

  .recent {
    margin-top: 72px;
    padding-top: 30px;
    border-top: 1px solid var(--line);
  }

  .recent h2 {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 650;
    line-height: 1.4;
  }

  .beat {
    padding: 32px 0;
    border-top: 1px solid var(--line);
  }

  .beat:first-of-type {
    border-top: 0;
    padding-top: 0;
  }

  .beat-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 22px;
  }

  .author {
    display: block;
    color: var(--ink);
    font-size: 22px;
    font-weight: 650;
    line-height: 1.25;
  }

  .when,
  .status {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.4;
  }

  .when {
    display: block;
    margin-top: 3px;
  }

  .status {
    flex: none;
    white-space: nowrap;
  }

  .beat-body {
    max-width: 66ch;
  }

  .beat-body h3 {
    margin: 28px 0 8px;
    color: var(--ink);
    font-size: 17px;
    font-weight: 650;
    line-height: 1.35;
  }

  .beat-body h3:first-child {
    margin-top: 0;
  }

  .beat-body p {
    margin: 0 0 14px;
    text-wrap: pretty;
  }

  .beat-body ul {
    margin: 0 0 18px;
    padding-left: 1.25em;
  }

  .beat-body li {
    margin: 0 0 10px;
    padding-left: .1em;
  }

  .beat-body strong {
    font-weight: 650;
  }

  code {
    border-radius: 4px;
    background: var(--soft);
    color: var(--ink);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: .86em;
    padding: 2px 5px;
  }

  .empty {
    margin: 0;
    color: var(--muted);
    font-size: 17px;
  }

  dialog {
    width: min(520px, calc(100vw - 32px));
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--page);
    color: var(--ink);
    padding: 0;
  }

  dialog::backdrop {
    background: rgb(255 255 255 / .78);
  }

  .settings {
    padding: 24px;
  }

  .settings h2 {
    margin: 0 0 18px;
    font-size: 22px;
    line-height: 1.25;
  }

  .field {
    display: block;
    margin-top: 16px;
  }

  .field span {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .field input {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 0 10px;
    font-size: 15px;
  }

  .hint {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
  }

  @media (max-width: 640px) {
    .topbar-inner {
      padding: 12px 18px;
    }

    main {
      padding: 42px 18px 72px;
    }

    h1 {
      font-size: 34px;
    }

    .beat-input {
      min-height: 50vh;
      font-size: 20px;
    }

    .compose-bar {
      margin-top: 42px;
    }

    .beat-head {
      display: block;
    }

    .status {
      display: block;
      margin-top: 8px;
      white-space: normal;
    }
  }
</style>
</head>
<body>
  <nav class="topbar" aria-label="Primary">
    <div class="topbar-inner">
      <a class="brand" href="https://amitdialpad.github.io/heartbeats/">Heartbeats</a>
      <div class="top-actions">
        <button class="plain-button" id="settingsButton" type="button">Setup</button>
      </div>
    </div>
  </nav>

  <main>
    <section class="writer" aria-label="Write today's beat">
      <p class="date-line" id="todayLine"></p>
      <h1>Today</h1>
      <textarea class="beat-input" id="beatInput" spellcheck="true" placeholder="Write clean text."></textarea>
      <div class="compose-bar">
        <div class="meta" id="meta"></div>
        <button class="done-button" id="doneButton" type="button">Done</button>
      </div>
    </section>

    <section class="recent" aria-label="Recent beats">
      <h2>Recent</h2>
      <div id="feed"></div>
    </section>
  </main>

  <dialog id="settingsDialog">
    <form class="settings" method="dialog">
      <h2>Setup</h2>
      <label class="field">
        <span>Author</span>
        <input id="authorInput" autocomplete="username" value="amit" />
      </label>
      <label class="field">
        <span>GitHub token</span>
        <input id="tokenInput" autocomplete="off" type="password" placeholder="github_pat_..." />
      </label>
      <p class="hint">Fine-grained token, repo access to <code>amitdialpad/heartbeats</code>, Contents read and write.</p>
      <div class="settings-actions">
        <button class="plain-button" id="forgetButton" type="button">Forget</button>
        <button class="plain-button" value="cancel">Close</button>
        <button class="done-button" id="saveSettingsButton" type="button">Save</button>
      </div>
    </form>
  </dialog>

<script>
const OWNER = "amitdialpad";
const REPO = "heartbeats";
const BRANCH = "main";
const STORAGE = {
  token: "heartbeats.githubToken",
  author: "heartbeats.author",
  draft: "heartbeats.draft",
};
const NAMES = { amit: "Amit", josh: "Josh" };

const input = document.getElementById("beatInput");
const doneButton = document.getElementById("doneButton");
const meta = document.getElementById("meta");
const todayLine = document.getElementById("todayLine");
const feed = document.getElementById("feed");
const settingsDialog = document.getElementById("settingsDialog");
const settingsButton = document.getElementById("settingsButton");
const authorInput = document.getElementById("authorInput");
const tokenInput = document.getElementById("tokenInput");
const saveSettingsButton = document.getElementById("saveSettingsButton");
const forgetButton = document.getElementById("forgetButton");

function pad(n) {
  return String(n).padStart(2, "0");
}

function localDate(d = new Date()) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function localTime(d = new Date()) {
  return `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function cap(s) {
  return NAMES[s] || (s ? s[0].toUpperCase() + s.slice(1) : "");
}

function fmtDate(d) {
  const dt = new Date(d + "T00:00:00");
  return isNaN(dt) ? d : dt.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

function statusLabel(s) {
  if (s === "red") return "Red flag";
  if (s === "concern") return "Concern";
  return "Fine";
}

function wordCount(text) {
  return (text.trim().match(/\S+/g) || []).length;
}

function resizeInput() {
  input.style.height = "auto";
  input.style.height = Math.max(input.scrollHeight, window.innerHeight * 0.48) + "px";
}

function updateMeta() {
  const words = wordCount(input.value);
  if (!words) {
    meta.textContent = hasToken() ? "Ready" : "Setup needed";
    doneButton.disabled = false;
    return;
  }
  meta.textContent = words === 1 ? "1 word" : `${words} words`;
}

function hasToken() {
  return Boolean(localStorage.getItem(STORAGE.token));
}

function safeAuthor() {
  const author = (localStorage.getItem(STORAGE.author) || "amit").toLowerCase();
  return author.replace(/[^a-z0-9-]/g, "") || "amit";
}

function inferStatus(text) {
  const lower = text.toLowerCase();
  const red = [
    /\bred flag\b/,
    /\bblocked\b/,
    /\bstuck\b/,
    /\bcannot\b/,
    /\bcan't\b/,
    /\bcritical\b/,
    /\burgent\b/,
    /\bbroken\b/,
    /\bship(ping)? blocker\b/,
    /\bdoes not work\b/,
    /\bneed(s)? (a )?decision\b/,
    /\bno path\b/,
  ];
  const concern = [
    /\bconcern\b/,
    /\bworried\b/,
    /\brisk\b/,
    /\bdelay(ed)?\b/,
    /\bwaiting\b/,
    /\bunclear\b/,
    /\bissue\b/,
    /\bproblem\b/,
    /\bpush back\b/,
    /\bdepends on\b/,
    /\bneed\b/,
  ];
  if (red.some(pattern => pattern.test(lower))) return "red";
  if (concern.some(pattern => pattern.test(lower))) return "concern";
  return "green";
}

function normalizeNote(text) {
  return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
}

function buildMarkdown(note) {
  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const status = inferStatus(note);
  return `---\nauthor: ${author}\ndate: ${date}\nstatus: ${status}\n---\n\n## Note\n${note}\n`;
}

function bytesToBase64(text) {
  const bytes = new TextEncoder().encode(text);
  let binary = "";
  for (let i = 0; i < bytes.length; i += 8192) {
    binary += String.fromCharCode(...bytes.slice(i, i + 8192));
  }
  return btoa(binary);
}

async function publishBeat(note) {
  const token = localStorage.getItem(STORAGE.token);
  if (!token) throw new Error("setup");

  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const path = `updates/${date}-${author}-${localTime(now)}.md`;
  const markdown = buildMarkdown(note);

  const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: JSON.stringify({
      message: `beat: ${author} ${date}`,
      content: bytesToBase64(markdown),
      branch: BRANCH,
    }),
  });

  if (!response.ok) {
    let detail = "";
    try {
      const json = await response.json();
      detail = json.message ? ` ${json.message}` : "";
    } catch {}
    throw new Error(`GitHub rejected the save.${detail}`);
  }

  return { path, markdown };
}

function renderFeed(entries) {
  const list = entries.slice(0, 5);
  if (!list.length) {
    feed.innerHTML = '<p class="empty">No beats yet.</p>';
    return;
  }

  feed.innerHTML = list.map(e => `
    <article class="beat">
      <div class="beat-head">
        <div>
          <span class="author">${cap(e.author)}</span>
          <span class="when">${fmtDate(e.date)}</span>
        </div>
        <span class="status">${statusLabel(e.status)}</span>
      </div>
      <div class="beat-body">${e.html}</div>
    </article>`).join("");
}

async function loadFeed() {
  try {
    const response = await fetch("./data/index.json", { cache: "no-store" });
    const data = await response.json();
    renderFeed(data.entries || []);
  } catch {
    feed.innerHTML = '<p class="empty">Could not load recent beats.</p>';
  }
}

function openSettings() {
  authorInput.value = localStorage.getItem(STORAGE.author) || "amit";
  tokenInput.value = localStorage.getItem(STORAGE.token) || "";
  settingsDialog.showModal();
  setTimeout(() => tokenInput.focus(), 0);
}

settingsButton.addEventListener("click", openSettings);

saveSettingsButton.addEventListener("click", () => {
  localStorage.setItem(STORAGE.author, authorInput.value.trim() || "amit");
  if (tokenInput.value.trim()) localStorage.setItem(STORAGE.token, tokenInput.value.trim());
  settingsDialog.close();
  updateMeta();
  input.focus();
});

forgetButton.addEventListener("click", () => {
  localStorage.removeItem(STORAGE.token);
  tokenInput.value = "";
  updateMeta();
});

input.addEventListener("input", () => {
  localStorage.setItem(STORAGE.draft, input.value);
  resizeInput();
  updateMeta();
});

doneButton.addEventListener("click", async () => {
  const note = normalizeNote(input.value);
  if (!note) {
    input.focus();
    return;
  }

  if (!hasToken()) {
    meta.textContent = "Setup needed";
    openSettings();
    return;
  }

  doneButton.disabled = true;
  meta.textContent = "Saving";
  try {
    await publishBeat(note);
    input.value = "";
    localStorage.removeItem(STORAGE.draft);
    resizeInput();
    meta.textContent = "Done. Publishing now.";
    setTimeout(loadFeed, 3500);
  } catch (error) {
    if (error.message === "setup") {
      meta.textContent = "Setup needed";
      openSettings();
    } else {
      meta.textContent = error.message || "Could not save.";
    }
  } finally {
    doneButton.disabled = false;
  }
});

todayLine.textContent = fmtDate(localDate());
input.value = localStorage.getItem(STORAGE.draft) || "";
resizeInput();
updateMeta();
loadFeed();
</script>
</body>
</html>
