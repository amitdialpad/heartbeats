<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Heartbeats</title>
<style>
  :root {
    --page: #fff;
    --ink: #1f1f1f;
    --muted: #666;
    --quiet: #8a8a8a;
    --line: #e6e6e6;
    --soft: #f7f7f7;
    --focus: #111;
  }

  * {
    box-sizing: border-box;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  a {
    color: inherit;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  .plain-button {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    padding: 0 10px;
    font-size: 14px;
    text-decoration: none;
  }

  .plain-button:hover {
    background: var(--soft);
    color: var(--ink);
  }

  main {
    width: 100%;
    min-height: 100vh;
    padding: 54px clamp(24px, 5.8vw, 96px) 112px;
  }

  .writer {
    min-height: calc(100vh - 166px);
  }

  .beat-input {
    display: block;
    width: 100%;
    min-height: calc(100vh - 166px);
    resize: none;
    overflow: hidden;
    border: 0;
    background: transparent;
    color: var(--ink);
    padding: 0;
    font-size: 32px;
    line-height: 1.58;
  }

  .beat-input::placeholder {
    color: var(--quiet);
    opacity: 1;
  }

  .beat-input:focus {
    outline: 0;
  }

  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 2;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px 20px;
    width: 100%;
    padding: 14px clamp(18px, 3vw, 34px);
    background: var(--page);
    border-top: 1px solid var(--line);
  }

  .project-access {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .project {
    color: var(--ink);
    font-size: 14px;
    font-weight: 650;
    line-height: 1.2;
    text-decoration: none;
  }

  .meta {
    min-height: 22px;
    color: var(--quiet);
    font-size: 14px;
    line-height: 1.4;
    text-align: right;
  }

  .done-button {
    min-width: 86px;
    min-height: 42px;
    flex: none;
    border: 1px solid var(--ink);
    border-radius: 6px;
    background: var(--ink);
    color: var(--page);
    padding: 0 18px;
    font-size: 15px;
    font-weight: 650;
    line-height: 1;
  }

  .done-button:hover {
    background: #000;
  }

  .done-button:disabled {
    border-color: var(--line);
    background: var(--soft);
    color: var(--quiet);
    cursor: default;
  }

  code {
    border-radius: 4px;
    background: var(--soft);
    color: var(--ink);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: .86em;
    padding: 2px 5px;
  }

  dialog {
    width: min(520px, calc(100vw - 32px));
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--page);
    color: var(--ink);
    padding: 0;
  }

  dialog::backdrop {
    background: rgb(255 255 255 / .78);
  }

  .settings {
    padding: 24px;
  }

  .settings h2 {
    margin: 0 0 18px;
    font-size: 22px;
    line-height: 1.25;
  }

  .field {
    display: block;
    margin-top: 16px;
  }

  .field span {
    display: block;
    margin-bottom: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .field input {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 0 10px;
    font-size: 15px;
  }

  .hint {
    margin: 12px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
  }

  .settings-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 22px;
  }

  @media (max-width: 640px) {
    main {
      padding: 34px 18px 142px;
    }

    .beat-input {
      min-height: calc(100vh - 176px);
      font-size: 27px;
      line-height: 1.55;
    }

    .footer-bar {
      grid-template-columns: 1fr auto;
      gap: 8px 12px;
      padding: 11px 12px;
    }

    .project-access {
      gap: 4px;
    }

    .plain-button {
      padding: 0 8px;
    }

    .meta {
      grid-column: 1 / -1;
      width: 100%;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: left;
    }

    .done-button {
      min-width: 74px;
      padding: 0 14px;
    }
  }
</style>
</head>
<body>
  <main>
    <section class="writer" aria-label="Write today's beat">
      <textarea class="beat-input" id="beatInput" spellcheck="true" placeholder="Write clean text."></textarea>
    </section>
  </main>

  <footer class="footer-bar">
    <div class="project-access">
      <a class="project" id="footerDate" href="https://amitdialpad.github.io/heartbeats/"></a>
      <a class="plain-button" href="./archive.html">Past updates</a>
      <button class="plain-button" id="settingsButton" type="button">Setup</button>
    </div>
    <div class="meta" id="meta"></div>
    <button class="done-button" id="doneButton" type="button">Done</button>
  </footer>

  <dialog id="settingsDialog">
    <form class="settings" method="dialog">
      <h2>Setup</h2>
      <label class="field">
        <span>Author</span>
        <input id="authorInput" autocomplete="username" value="amit" />
      </label>
      <label class="field">
        <span>GitHub token</span>
        <input id="tokenInput" autocomplete="off" type="password" placeholder="github_pat_..." />
      </label>
      <p class="hint">Fine-grained token, repo access to <code>amitdialpad/heartbeats</code>, Contents read and write.</p>
      <div class="settings-actions">
        <button class="plain-button" id="forgetButton" type="button">Forget</button>
        <button class="plain-button" value="cancel">Close</button>
        <button class="done-button" id="saveSettingsButton" type="button">Save</button>
      </div>
    </form>
  </dialog>

<script>
const OWNER = "amitdialpad";
const REPO = "heartbeats";
const BRANCH = "main";
const STORAGE = {
  token: "heartbeats.githubToken",
  author: "heartbeats.author",
  draft: "heartbeats.draft",
};

const input = document.getElementById("beatInput");
const doneButton = document.getElementById("doneButton");
const meta = document.getElementById("meta");
const footerDate = document.getElementById("footerDate");
const settingsDialog = document.getElementById("settingsDialog");
const settingsButton = document.getElementById("settingsButton");
const authorInput = document.getElementById("authorInput");
const tokenInput = document.getElementById("tokenInput");
const saveSettingsButton = document.getElementById("saveSettingsButton");
const forgetButton = document.getElementById("forgetButton");

function pad(n) {
  return String(n).padStart(2, "0");
}

function localDate(d = new Date()) {
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

function localTime(d = new Date()) {
  return `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}

function displayDate(d = new Date()) {
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function wordCount(text) {
  return (text.trim().match(/\S+/g) || []).length;
}

function minimumInputHeight() {
  return window.innerHeight - (window.matchMedia("(max-width: 640px)").matches ? 176 : 166);
}

function resizeInput() {
  input.style.height = "auto";
  input.style.height = Math.max(input.scrollHeight, minimumInputHeight()) + "px";
}

function updateMeta() {
  const words = wordCount(input.value);
  if (!words) {
    meta.textContent = hasToken() ? "Ready" : "Setup needed";
    doneButton.disabled = false;
    return;
  }
  meta.textContent = words === 1 ? "1 word" : `${words} words`;
}

function hasToken() {
  return Boolean(localStorage.getItem(STORAGE.token));
}

function safeAuthor() {
  const author = (localStorage.getItem(STORAGE.author) || "amit").toLowerCase();
  return author.replace(/[^a-z0-9-]/g, "") || "amit";
}

function inferStatus(text) {
  const lower = text.toLowerCase();
  const red = [
    /\bred flag\b/,
    /\bblocked\b/,
    /\bstuck\b/,
    /\bcannot\b/,
    /\bcan't\b/,
    /\bcritical\b/,
    /\burgent\b/,
    /\bbroken\b/,
    /\bship(ping)? blocker\b/,
    /\bdoes not work\b/,
    /\bneed(s)? (a )?decision\b/,
    /\bno path\b/,
  ];
  const concern = [
    /\bconcern\b/,
    /\bworried\b/,
    /\brisk\b/,
    /\bdelay(ed)?\b/,
    /\bwaiting\b/,
    /\bunclear\b/,
    /\bissue\b/,
    /\bproblem\b/,
    /\bpush back\b/,
    /\bdepends on\b/,
    /\bneed\b/,
  ];
  if (red.some(pattern => pattern.test(lower))) return "red";
  if (concern.some(pattern => pattern.test(lower))) return "concern";
  return "green";
}

function normalizeNote(text) {
  return text.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();
}

function buildMarkdown(note) {
  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const status = inferStatus(note);
  return `---\nauthor: ${author}\ndate: ${date}\nstatus: ${status}\n---\n\n## Note\n${note}\n`;
}

function bytesToBase64(text) {
  const bytes = new TextEncoder().encode(text);
  let binary = "";
  for (let i = 0; i < bytes.length; i += 8192) {
    binary += String.fromCharCode(...bytes.slice(i, i + 8192));
  }
  return btoa(binary);
}

async function publishBeat(note) {
  const token = localStorage.getItem(STORAGE.token);
  if (!token) throw new Error("setup");

  const now = new Date();
  const author = safeAuthor();
  const date = localDate(now);
  const path = `updates/${date}-${author}-${localTime(now)}.md`;
  const markdown = buildMarkdown(note);

  const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: JSON.stringify({
      message: `beat: ${author} ${date}`,
      content: bytesToBase64(markdown),
      branch: BRANCH,
    }),
  });

  if (!response.ok) {
    let detail = "";
    try {
      const json = await response.json();
      detail = json.message ? ` ${json.message}` : "";
    } catch {}
    throw new Error(`GitHub rejected the save.${detail}`);
  }

  return { path, markdown };
}

function openSettings() {
  authorInput.value = localStorage.getItem(STORAGE.author) || "amit";
  tokenInput.value = localStorage.getItem(STORAGE.token) || "";
  settingsDialog.showModal();
  setTimeout(() => tokenInput.focus(), 0);
}

settingsButton.addEventListener("click", openSettings);

saveSettingsButton.addEventListener("click", () => {
  localStorage.setItem(STORAGE.author, authorInput.value.trim() || "amit");
  if (tokenInput.value.trim()) localStorage.setItem(STORAGE.token, tokenInput.value.trim());
  settingsDialog.close();
  updateMeta();
  input.focus();
});

forgetButton.addEventListener("click", () => {
  localStorage.removeItem(STORAGE.token);
  tokenInput.value = "";
  updateMeta();
});

input.addEventListener("input", () => {
  localStorage.setItem(STORAGE.draft, input.value);
  resizeInput();
  updateMeta();
});

window.addEventListener("resize", resizeInput);

doneButton.addEventListener("click", async () => {
  const note = normalizeNote(input.value);
  if (!note) {
    input.focus();
    return;
  }

  if (!hasToken()) {
    meta.textContent = "Setup needed";
    openSettings();
    return;
  }

  doneButton.disabled = true;
  meta.textContent = "Saving";
  try {
    await publishBeat(note);
    input.value = "";
    localStorage.removeItem(STORAGE.draft);
    resizeInput();
    meta.textContent = "Done. Publishing now.";
  } catch (error) {
    if (error.message === "setup") {
      meta.textContent = "Setup needed";
      openSettings();
    } else {
      meta.textContent = error.message || "Could not save.";
    }
  } finally {
    doneButton.disabled = false;
  }
});

input.value = localStorage.getItem(STORAGE.draft) || "";
footerDate.textContent = displayDate();
resizeInput();
updateMeta();
</script>
</body>
</html>
