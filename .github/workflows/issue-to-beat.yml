name: Issue to beat

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  convert:
    if: contains(github.event.issue.labels.*.name, 'beat')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Convert issue to markdown
        id: conv
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: echo "path=$(node ./scripts/issue-to-beat.mjs)" >> "$GITHUB_OUTPUT"
      - name: Commit
        run: |
          git config user.name "heartbeats-bot"
          git config user.email "bot@users.noreply.github.com"
          git add updates/
          git commit -m "beat via issue #${{ github.event.issue.number }}"
          git push
      - name: Acknowledge and close
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Posted ✓ — live at https://amitdialpad.github.io/heartbeats/ in ~1 min."
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });
