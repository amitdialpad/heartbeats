name: New beat
description: Post a heartbeat without the terminal (works on mobile).
title: "beat"
labels: ["beat"]
body:
  - type: dropdown
    id: author
    attributes:
      label: Who's writing
      options: [amit, josh]
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Status
      description: The highest flag in this beat.
      options: [green, concern, red]
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where I'm at
      description: One or two lines — what you're heads-down on right now.
    validations:
      required: true
  - type: textarea
    id: green
    attributes:
      label: Green
      description: Things moving fine. One per line, just list them.
  - type: textarea
    id: concerns
    attributes:
      label: Concerns
      description: The issue, how you're handling it, what you need. One per line.
  - type: textarea
    id: red
    attributes:
      label: Red flags
      description: What's stuck or drastic, why, and the decision you need. Leave blank if none.
  - type: textarea
    id: pov
    attributes:
      label: Point of view
      description: Your reasoning on something you'll need to push back on — written before the call. Leave blank if none.
