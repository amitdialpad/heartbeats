<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Past updates - Heartbeats</title>
<style>
  :root {
    --page: #101010;
    --ink: #f4f4f4;
    --muted: #b8b8b8;
    --quiet: #8c8c8c;
    --line: #303030;
    --soft: #1a1a1a;
    --focus: #fff;
  }

  * {
    box-sizing: border-box;
  }

  html {
    -webkit-text-size-adjust: 100%;
  }

  body {
    margin: 0;
    background: var(--page);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.62;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  button,
  a {
    -webkit-tap-highlight-color: transparent;
  }

  a {
    color: inherit;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }

  main {
    width: 100%;
    min-height: 100vh;
    padding: 54px clamp(24px, 5.8vw, 96px) 112px;
  }

  .page-title {
    margin: 0 0 44px;
    color: var(--ink);
    font-size: 29px;
    font-weight: 650;
    line-height: 1.22;
  }

  .archive-tools {
    width: min(900px, 100%);
    margin: -24px 0 34px;
  }

  .archive-search {
    width: min(420px, 100%);
    min-height: 42px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 0 12px;
    font: inherit;
    font-size: 16px;
    line-height: 1.2;
  }

  .archive-search::placeholder {
    color: var(--quiet);
  }

  .archive {
    width: min(900px, 100%);
  }

  .beat {
    padding: 44px 0;
    border-top: 1px solid var(--line);
  }

  .beat:first-child {
    border-top: 0;
    padding-top: 0;
  }

  .beat-head {
    position: relative;
    margin-bottom: 26px;
    padding-right: 132px;
  }

  .beat-date {
    display: block;
    color: var(--ink);
    font-size: 30px;
    font-weight: 650;
    line-height: 1.15;
  }

  .beat-actions {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease;
  }

  .beat:hover .beat-actions,
  .beat:focus-within .beat-actions {
    opacity: 1;
    pointer-events: auto;
  }

  .action-button {
    min-height: 30px;
    border: 0;
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    padding: 0 8px;
    font: inherit;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
  }

  .action-button:hover {
    background: var(--soft);
    color: var(--ink);
  }

  .beat-body {
    width: 100%;
    max-width: 76ch;
    overflow-wrap: anywhere;
  }

  .beat-body p,
  .beat-body h2,
  .beat-body h3,
  .beat-body h4,
  .beat-body ul,
  .beat-body blockquote,
  .beat-body hr,
  .beat-body .link-card {
    max-width: 64ch;
  }

  .beat-body h2 {
    margin: 0 0 18px;
    color: var(--ink);
    font-size: 22px;
    font-weight: 650;
    line-height: 1.25;
  }

  .beat-body h3 {
    margin: 34px 0 10px;
    color: var(--ink);
    font-size: 17px;
    font-weight: 650;
    line-height: 1.35;
  }

  .beat-body h3:first-child {
    margin-top: 0;
  }

  .beat-body h3.section-label {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    margin: 34px 0 12px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--ink);
    padding: 0 9px;
    font-size: 12px;
    font-weight: 650;
    line-height: 1;
  }

  .beat-body h3.section-label:first-child {
    margin-top: 0;
  }

  .beat-body h4 {
    margin: 22px 0 8px;
    color: var(--ink);
    font-size: 15px;
    font-weight: 650;
    line-height: 1.35;
  }

  .beat-body p {
    margin: 0 0 14px;
  }

  .beat-body ul {
    margin: 0 0 18px;
    padding-left: 1.25em;
  }

  .beat-body li {
    margin: 0 0 10px;
    padding-left: .1em;
  }

  .beat-body strong {
    font-weight: 650;
  }

  .beat-body blockquote {
    margin: 20px 0;
    padding: 0 0 0 18px;
    border-left: 2px solid var(--line);
    color: var(--muted);
  }

  .beat-body blockquote p {
    margin-bottom: 10px;
  }

  .beat-body figure {
    width: min(100%, 920px);
    max-width: 100%;
    margin: 24px 0 26px;
  }

  .beat-body figure[data-image-size="small"] {
    width: min(420px, 100%);
  }

  .beat-body figure[data-image-size="medium"] {
    width: min(640px, 100%);
  }

  .beat-body figure[data-image-size="large"] {
    width: min(820px, 100%);
  }

  .beat-body img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--soft);
  }

  .beat-body figcaption {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.45;
  }

  .beat-body a:not(.link-card) {
    text-decoration-thickness: 1px;
    text-underline-offset: 4px;
  }

  .beat-body .link-card {
    display: block;
    width: min(100%, 720px);
    margin: 8px 0 24px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--page);
    color: var(--ink);
    padding: 14px 15px 13px;
    text-decoration: none;
  }

  .beat-body .link-card:hover {
    background: var(--soft);
  }

  .beat-body .link-card-title,
  .beat-body .link-card-url {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .beat-body .link-card-title {
    color: var(--ink);
    font-size: 16px;
    font-weight: 650;
    line-height: 1.35;
  }

  .beat-body .link-card-url {
    margin-top: 4px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;
  }

  .beat-body hr {
    height: 1px;
    border: 0;
    background: var(--line);
    margin: 28px 0;
  }

  code {
    border-radius: 4px;
    background: var(--soft);
    color: var(--ink);
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    font-size: .86em;
    padding: 2px 5px;
  }

  .empty {
    margin: 0;
    color: var(--muted);
    font-size: 18px;
  }

  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 14px clamp(18px, 3vw, 34px);
    background: var(--page);
    border-top: 1px solid var(--line);
  }

  .project {
    color: var(--ink);
    font-size: 14px;
    font-weight: 650;
    line-height: 1.2;
    text-decoration: none;
  }

  .plain-link {
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    border-radius: 6px;
    color: var(--muted);
    padding: 0 10px;
    font-size: 14px;
    text-decoration: none;
  }

  .plain-link:hover {
    background: var(--soft);
    color: var(--ink);
  }

  @media (max-width: 640px) {
    main {
      width: 100vw;
      max-width: 100vw;
      padding: 34px 18px 118px;
      overflow-x: hidden;
    }

    .archive,
    .beat,
    .beat-body {
      inline-size: calc(100vw - 36px);
      max-inline-size: calc(100vw - 36px);
    }

    .beat-body p,
    .beat-body blockquote,
    .beat-body figcaption {
      max-inline-size: 31ch;
      white-space: normal;
    }

    .beat-body ul {
      max-inline-size: 30ch;
      white-space: normal;
    }

    .beat-body figure {
      inline-size: 100%;
      max-inline-size: 100%;
      white-space: normal;
    }

    .page-title {
      margin-bottom: 28px;
      font-size: 28px;
    }

    .archive-tools {
      margin: -10px 0 28px;
    }

    .beat {
      padding: 38px 0;
    }

    .beat-head {
      padding-right: 0;
    }

    .beat-date {
      font-size: 30px;
    }

    .beat-actions {
      position: static;
      margin-top: 10px;
      opacity: 1;
      pointer-events: auto;
    }

    .action-button {
      min-height: 32px;
      padding: 0 8px 0 0;
    }

    .footer-bar {
      padding: 11px 12px;
    }
  }
</style>
</head>
<body>
  <main>
    <h1 class="page-title">Past updates</h1>
    <div class="archive-tools">
      <input class="archive-search" id="archiveSearch" type="search" placeholder="Search updates" autocomplete="off" aria-label="Search past updates" />
    </div>
    <section class="archive" id="archive" aria-label="Past updates"></section>
  </main>

  <footer class="footer-bar">
    <a class="project" href="./">Heartbeats</a>
    <a class="plain-link" href="./">Write</a>
  </footer>

<script>
const OWNER = "amitdialpad";
const REPO = "heartbeats";
const DEFAULT_CONTENT_OWNER = OWNER;
const DEFAULT_CONTENT_REPO = "heartbeats-private";
const BRANCH = "main";
const archive = document.getElementById("archive");
const archiveSearch = document.getElementById("archiveSearch");
const STORAGE = {
  token: "heartbeats.githubToken",
  contentOwner: "heartbeats.contentOwner",
  contentRepo: "heartbeats.contentRepo",
  draft: "heartbeats.draft",
  draftContext: "heartbeats.draftContext",
  editing: "heartbeats.editing",
  localEntries: "heartbeats.localEntries",
  localOverrides: "heartbeats.localOverrides",
  hiddenEntries: "heartbeats.hiddenEntries",
};
const LOCAL_ONLY = ["localhost", "127.0.0.1", ""].includes(location.hostname);
let currentEntries = [];
let allEntries = [];

function displayDate(d) {
  const dt = new Date(d + "T00:00:00");
  return isNaN(dt) ? d : dt.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" });
}

function esc(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function attr(s) {
  return esc(s).replace(/"/g, "&quot;");
}

function readJson(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
  } catch {
    return fallback;
  }
}

function writeJson(key, value) {
  localStorage.setItem(key, JSON.stringify(value));
}

function contentRepo() {
  return {
    owner: localStorage.getItem(STORAGE.contentOwner) || DEFAULT_CONTENT_OWNER,
    repo: localStorage.getItem(STORAGE.contentRepo) || DEFAULT_CONTENT_REPO,
  };
}

function contentRepoLabel(repo = contentRepo()) {
  return `${repo.owner}/${repo.repo}`;
}

function safeUrl(raw) {
  const url = String(raw || "").trim();
  return /^(https?:|mailto:|#|\/|\.\/|\.\.\/|assets\/|data:image\/|[a-z0-9._~/-]+(?:[?#][^\s]*)?$)/i.test(url) ? attr(url) : "#";
}

function linkHost(raw) {
  try {
    return new URL(raw).hostname.replace(/^www\./, "");
  } catch {
    return String(raw || "").replace(/^https?:\/\//, "").split("/")[0] || raw;
  }
}

function standaloneLink(t) {
  const markdown = t.match(/^\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)$/);
  if (markdown) return { label: markdown[1].trim(), url: markdown[2].trim() };
  const raw = t.match(/^(https?:\/\/[^\s<]+)$/);
  if (!raw) return null;
  return { label: linkHost(raw[1]), url: raw[1].replace(/[.,;:!?]+$/, "") };
}

function linkCard(url, label) {
  const clean = url.trim();
  const title = (label || "").trim() || linkHost(clean);
  return `<a class="link-card" href="${safeUrl(clean)}" target="_blank" rel="noopener"><span class="link-card-title">${esc(title)}</span><span class="link-card-url">${attr(linkHost(clean))}</span></a>`;
}

function sectionKey(s) {
  const key = s.trim().toLowerCase();
  const aliases = {
    green: "green",
    concerns: "concerns",
    "red flag": "red-flags",
    "red flags": "red-flags",
    pov: "point-of-view",
    "point of view": "point-of-view",
  };
  return aliases[key] || "";
}

function inline(s) {
  const tokens = [];
  const stash = (html) => {
    tokens.push(html);
    return `\u0000${tokens.length - 1}\u0000`;
  };
  let html = esc(s);
  html = html.replace(/`([^`]+)`/g, (_, code) => stash(`<code>${code}</code>`));
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
    const label = text.trim() || url.trim();
    return stash(`<a href="${safeUrl(url)}" target="_blank" rel="noopener">${inline(label)}</a>`);
  });
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/(^|[^*])\*([^*\s][^*]*?)\*/g, "$1<em>$2</em>");
  html = html.replace(/(^|[\s(])((?:https?:\/\/)[^\s<)]+)/g, (_, lead, url) => {
    const clean = url.replace(/[.,;:!?]+$/, "");
    const tail = url.slice(clean.length);
    return `${lead}${stash(`<a href="${safeUrl(clean)}" target="_blank" rel="noopener">${attr(clean)}</a>`)}${tail}`;
  });
  return html.replace(/\u0000(\d+)\u0000/g, (_, i) => tokens[Number(i)] || "");
}

function mdToHtml(md) {
  const out = [];
  let list = null;
  let quote = null;
  const flush = () => {
    if (list) { out.push("<ul>" + list.join("") + "</ul>"); list = null; }
    if (quote) { out.push("<blockquote>" + quote.join("") + "</blockquote>"); quote = null; }
  };
  for (const line of md.split("\n")) {
    const t = line.trim();
    if (!t) { flush(); continue; }
    const image = t.match(/^!\[([^\]]*)\]\(([^)\s]+)(?:\s+"(small|medium|large|full)")?\)$/);
    if (image) {
      flush();
      const caption = image[1].trim();
      const size = image[3] ? ` data-image-size="${attr(image[3])}"` : "";
      out.push(`<figure${size}><img src="${safeUrl(image[2])}" alt="${attr(caption)}" loading="lazy">${caption ? `<figcaption>${inline(caption)}</figcaption>` : ""}</figure>`);
      continue;
    }
    const card = standaloneLink(t);
    if (card) { flush(); out.push(linkCard(card.url, card.label)); continue; }
    if (/^-{3,}$/.test(t)) { flush(); out.push("<hr>"); continue; }
    if (t.startsWith("# ")) { flush(); out.push(`<h2>${inline(t.slice(2))}</h2>`); continue; }
    if (t.startsWith("## ")) {
      flush();
      const label = t.slice(3).trim();
      const key = sectionKey(label);
      out.push(key ? `<h3 class="section-label" data-section="${attr(key)}">${inline(label)}</h3>` : `<h3>${inline(label)}</h3>`);
      continue;
    }
    if (t.startsWith("### ")) { flush(); out.push(`<h4>${inline(t.slice(4))}</h4>`); continue; }
    if (t.startsWith("- ")) { (list ||= []).push(`<li>${inline(t.slice(2))}</li>`); continue; }
    if (t.startsWith("> ")) { (quote ||= []).push(`<p>${inline(t.slice(2))}</p>`); continue; }
    flush();
    out.push(`<p>${inline(t)}</p>`);
  }
  flush();
  return out.join("\n");
}

function parseMarkdown(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if (!match) return { meta: {}, body: raw.trim() };
  const meta = {};
  for (const line of match[1].split("\n")) {
    const index = line.indexOf(":");
    if (index === -1) continue;
    meta[line.slice(0, index).trim()] = line.slice(index + 1).trim();
  }
  return { meta, body: match[2].trim() };
}

function decodeBase64Utf8(content) {
  const binary = atob(String(content || "").replace(/\s/g, ""));
  const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

function assetMime(path) {
  const ext = String(path || "").split(".").pop().toLowerCase();
  if (ext === "jpg" || ext === "jpeg") return "image/jpeg";
  if (ext === "gif") return "image/gif";
  if (ext === "webp") return "image/webp";
  return "image/png";
}

function shouldFetchPrivateAsset(url) {
  return url && !/^(https?:|mailto:|data:|#|\/|\.\/|\.\.\/)/i.test(url);
}

async function resolvePrivateAssets(markdown, token) {
  const cache = new Map();
  const pattern = /!\[([^\]]*)\]\(([^)\s]+)(\s+"(?:small|medium|large|full)")?\)/g;
  const replacements = [];
  for (const match of markdown.matchAll(pattern)) {
    const path = match[2];
    if (!shouldFetchPrivateAsset(path)) continue;
    if (!cache.has(path)) {
      const asset = await getGitHubContent(path, token);
      cache.set(path, `data:${assetMime(path)};base64,${String(asset.content || "").replace(/\s/g, "")}`);
    }
    replacements.push({ from: match[0], to: `![${match[1]}](${cache.get(path)}${match[3] || ""})` });
  }
  return replacements.reduce((next, item) => next.replace(item.from, item.to), markdown);
}

function entryKey(entry) {
  return entry.path || entry.id;
}

function render(entries, emptyMessage = "No past updates yet.") {
  currentEntries = entries;
  if (!entries.length) {
    archive.innerHTML = `<p class="empty">${esc(emptyMessage)}</p>`;
    return;
  }

  archive.innerHTML = entries.map(entry => `
    <article class="beat" data-entry-id="${attr(entry.id)}">
      <div class="beat-head">
        <time class="beat-date" datetime="${entry.date}">${displayDate(entry.date)}</time>
        <div class="beat-actions" aria-label="Update actions">
          <button class="action-button" type="button" data-action="edit" data-entry-id="${attr(entry.id)}">Edit</button>
          <button class="action-button" type="button" data-action="delete" data-entry-id="${attr(entry.id)}">Delete</button>
        </div>
      </div>
      <div class="beat-body">${entry.html}</div>
    </article>
  `).join("");
}

function readLocalEntries() {
  return readJson(STORAGE.localEntries, []).map(entry => ({ ...entry, source: "local" }));
}

function readLocalOverrides() {
  return readJson(STORAGE.localOverrides, []).map(entry => ({ ...entry, source: "override" }));
}

function readHiddenEntries() {
  return new Set(readJson(STORAGE.hiddenEntries, []));
}

function hideEntry(entry) {
  const hidden = readJson(STORAGE.hiddenEntries, []);
  const key = entryKey(entry);
  if (!hidden.includes(key)) hidden.push(key);
  writeJson(STORAGE.hiddenEntries, hidden);
}

function removeLocalEntry(entry) {
  writeJson(STORAGE.localEntries, readJson(STORAGE.localEntries, []).filter(item => item.id !== entry.id));
}

function removeLocalOverride(entry) {
  const key = entryKey(entry);
  writeJson(STORAGE.localOverrides, readJson(STORAGE.localOverrides, []).filter(item => entryKey(item) !== key));
}

function mergeEntries(indexedEntries) {
  const hidden = readHiddenEntries();
  const overrides = new Map(readLocalOverrides().map(entry => [entryKey(entry), entry]));
  const entries = [];

  for (const entry of indexedEntries) {
    const key = entryKey(entry);
    if (hidden.has(key)) continue;
    const override = overrides.get(key);
    entries.push({ ...entry, ...(override || {}), source: override ? "override" : entry.source || "indexed" });
  }

  for (const entry of readLocalEntries()) {
    if (!hidden.has(entryKey(entry))) entries.push(entry);
  }

  return entries;
}

function sortEntries(entries) {
  return entries.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : a.id < b.id ? 1 : -1));
}

function textFromHtml(html) {
  const template = document.createElement("template");
  template.innerHTML = html || "";
  return template.content.textContent || "";
}

function linkHostsFromHtml(html) {
  const template = document.createElement("template");
  template.innerHTML = html || "";
  return Array.from(template.content.querySelectorAll("a[href]")).map(link => {
    const href = link.getAttribute("href") || "";
    try {
      return new URL(href, location.href).hostname.replace(/^www\./, "");
    } catch {
      return href.replace(/^https?:\/\//, "").split("/")[0];
    }
  }).filter(Boolean);
}

function sectionLabelsFromMarkdown(markdown) {
  return (markdown || "")
    .split("\n")
    .filter(line => line.trim().startsWith("## "))
    .map(line => line.trim().slice(3));
}

function searchableEntryText(entry) {
  return [
    entry.date || "",
    displayDate(entry.date || ""),
    entry.markdown || "",
    textFromHtml(entry.html),
    sectionLabelsFromMarkdown(entry.markdown || "").join(" "),
    linkHostsFromHtml(entry.html).join(" "),
  ].join(" ").toLowerCase();
}

function applyArchiveSearch() {
  const query = archiveSearch.value.trim().toLowerCase();
  if (!query) {
    render(allEntries);
    return;
  }
  const filtered = allEntries.filter(entry => searchableEntryText(entry).includes(query));
  render(filtered, "No matching updates.");
}

async function getGitHubContent(path, token, target = contentRepo()) {
  const response = await fetch(`https://api.github.com/repos/${target.owner}/${target.repo}/contents/${path}?ref=${BRANCH}`, {
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "X-GitHub-Api-Version": "2022-11-28",
    },
  });
  if (!response.ok) {
    const error = new Error("Could not read the GitHub file.");
    error.status = response.status;
    throw error;
  }
  return response.json();
}

async function loadPrivateEntries(token) {
  let listing;
  try {
    listing = await getGitHubContent("updates", token);
  } catch (error) {
    if (error.status === 404) return [];
    throw error;
  }
  const files = Array.isArray(listing) ? listing.filter(file => file.type === "file" && file.name.endsWith(".md")).sort((a, b) => a.name < b.name ? 1 : -1) : [];
  const entries = [];
  for (const file of files) {
    const content = await getGitHubContent(file.path, token);
    const { meta, body } = parseMarkdown(decodeBase64Utf8(content.content || ""));
    const markdownWithAssets = await resolvePrivateAssets(body, token);
    const id = file.name.replace(/\.md$/, "");
    entries.push({
      id,
      path: file.path,
      author: (meta.author || "amit").toLowerCase(),
      date: meta.date || id.slice(0, 10),
      status: (meta.status || "green").toLowerCase(),
      markdown: body,
      html: mdToHtml(markdownWithAssets),
      source: "private",
    });
  }
  return entries;
}

async function deleteGitHubContent(entry) {
  const token = localStorage.getItem(STORAGE.token);
  if (!token) throw new Error("Setup needed. Save your GitHub token in the writer first.");
  if (!entry.path) throw new Error("This update does not have a repo path.");
  const target = contentRepo();
  const existing = await getGitHubContent(entry.path, token, target);
  const response = await fetch(`https://api.github.com/repos/${target.owner}/${target.repo}/contents/${entry.path}`, {
    method: "DELETE",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": `Bearer ${token}`,
      "Content-Type": "application/json",
      "X-GitHub-Api-Version": "2022-11-28",
    },
    body: JSON.stringify({
      message: `delete beat: ${entry.date}`,
      sha: existing.sha,
      branch: BRANCH,
    }),
  });
  if (!response.ok) throw new Error("GitHub rejected the delete.");
}

function beginEdit(entry) {
  const existingDraft = localStorage.getItem(STORAGE.draft) || "";
  if (existingDraft.trim() && !window.confirm("Replace the current draft with this past update?")) return;
  localStorage.setItem(STORAGE.editing, JSON.stringify({
    id: entry.id,
    path: entry.path || "",
    source: entry.source,
    author: entry.author,
    date: entry.date,
    status: entry.status,
    markdown: entry.markdown || "",
    html: entry.html || "",
  }));
  localStorage.removeItem(STORAGE.draft);
  localStorage.removeItem(STORAGE.draftContext);
  location.href = `./?edit=${encodeURIComponent(entry.id)}`;
}

async function deleteEntry(entry) {
  if (!window.confirm(`Delete ${displayDate(entry.date)}?`)) return;

  try {
    if (entry.source === "local") {
      removeLocalEntry(entry);
    } else {
      if (!LOCAL_ONLY) await deleteGitHubContent(entry);
      removeLocalOverride(entry);
      hideEntry(entry);
    }
    await loadArchive();
  } catch (error) {
    window.alert(error.message || "Could not delete this update.");
  }
}

async function loadArchive() {
  if (!LOCAL_ONLY) {
    const token = localStorage.getItem(STORAGE.token);
    if (!token) {
      allEntries = [];
      render([], `Private updates. Open Write, then Tools > Setup, and use a token with access to ${contentRepoLabel()}.`);
      return;
    }
    try {
      allEntries = sortEntries(mergeEntries(await loadPrivateEntries(token)));
      applyArchiveSearch();
    } catch {
      allEntries = [];
      render([], `Could not load private updates from ${contentRepoLabel()}. Check repo access and token setup.`);
    }
    return;
  }

  try {
    const response = await fetch("./data/index.json", { cache: "no-store" });
    const data = await response.json();
    allEntries = sortEntries(mergeEntries(data.entries || []));
    applyArchiveSearch();
  } catch {
    const local = readLocalEntries();
    if (local.length) {
      allEntries = sortEntries(local);
      applyArchiveSearch();
    } else {
      allEntries = [];
      render([], "Could not load past updates.");
    }
  }
}

archive.addEventListener("click", async (event) => {
  const button = event.target.closest("[data-action]");
  if (!button) return;
  const entry = currentEntries.find(item => item.id === button.dataset.entryId);
  if (!entry) return;
  if (button.dataset.action === "edit") beginEdit(entry);
  if (button.dataset.action === "delete") await deleteEntry(entry);
});

archiveSearch.addEventListener("input", applyArchiveSearch);

loadArchive();
</script>
</body>
